# http://materialdesignicons.com/cdn/7.4.47/
# Icons used by the music dashboard and setup screens (device/lvgl.yaml).
# MaterialDesign-Webfont TTF uses codepoints in the PUA (U+F0xxx).

font:
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font
    size: 40
    bpp: 4
    glyphs:
      - "\U000F040A"  # mdi-play
      - "\U000F03E4"  # mdi-pause
      - "\U000F0415"  # mdi-plus
      - "\U000F0374"  # mdi-minus
      - "\U000F05A9"  # mdi-wifi
      - "\U000F07D0"  # mdi-home-assistant
      - "\U000F0118"  # mdi-cast
      - "\U000F0565"  # mdi-shield-check
      - "\U000F0502"  # mdi-television
      - "\U000F0D38"  # mdi-speaker-multiple
      - "\U000F0156"  # mdi-close
      - "\U000F02DC"  # mdi-home
      - "\U000F075A"  # mdi-music-note
      - "\U000F00ED"  # mdi-calendar
      - "\U000F050F"  # mdi-thermometer
      - "\U000F0208"  # mdi-eye (generic sensor fallback)
      - "\U000F07E4"  # mdi-water-percent (humidity)
      - "\U000F028A"  # mdi-gauge (pressure)
      - "\U000F04E3"  # mdi-water
      - "\U000F059E"  # mdi-weather-windy (wind speed)
      - "\U000F140B"  # mdi-lightning-bolt (power / energy)
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font_small
    size: 28
    bpp: 4
    glyphs:
      - "\U000F0415"  # mdi-plus
      - "\U000F0374"  # mdi-minus
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font_large
    size: 50
    bpp: 4
    glyphs:
      - "\U000F040A"  # mdi-play
      - "\U000F03E4"  # mdi-pause
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font_setup
    size: 64
    bpp: 4
    glyphs:
      - "\U000F05A9"  # mdi-wifi
      - "\U000F07D0"  # mdi-home-assistant
      - "\U000F0118"  # mdi-cast
      - "\U000F0565"  # mdi-shield-check

substitutions:
  play:          "\U000F040A"
  pause:         "\U000F03E4"
  icon_plus:     "\U000F0415"
  icon_minus:    "\U000F0374"
  icon_wifi:     "\U000F05A9"
  icon_ha:       "\U000F07D0"
  icon_cast:     "\U000F0118"
  icon_shield:   "\U000F0565"
  tv_icon:       "\U000F0502"
  icon_speakers: "\U000F0D38"
  icon_close:    "\U000F0156"
  icon_home:     "\U000F02DC"
  icon_music:    "\U000F075A"
  icon_calendar: "\U000F00ED"
  icon_thermo:   "\U000F050F"
