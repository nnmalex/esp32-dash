# http://materialdesignicons.com/cdn/7.4.47/
# Icons used by the music dashboard and setup screens (device/lvgl.yaml).
# MaterialDesign-Webfont TTF uses codepoints in the PUA (U+F0xxx).

font:
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font
    size: 40
    bpp: 4
    glyphs:
      - "\U000F040A"  # mdi-play
      - "\U000F03E4"  # mdi-pause
      - "\U000F0415"  # mdi-plus
      - "\U000F0374"  # mdi-minus
      - "\U000F05A9"  # mdi-wifi
      - "\U000F07D0"  # mdi-home-assistant
      - "\U000F0118"  # mdi-cast
      - "\U000F0565"  # mdi-shield-check
      - "\U000F0502"  # mdi-television
      - "\U000F0D38"  # mdi-speaker-multiple
      - "\U000F0156"  # mdi-close
      - "\U000F02DC"  # mdi-home
      - "\U000F075A"  # mdi-music-note
      - "\U000F00ED"  # mdi-calendar
      - "\U000F050F"  # mdi-thermometer
      - "\U000F0208"  # mdi-eye (generic sensor fallback)
      - "\U000F058E"  # mdi-water-percent (humidity)
      - "\U000F028A"  # mdi-gauge (pressure)
      - "\U000F058C"  # mdi-water
      - "\U000F059E"  # mdi-weather-windy (wind speed)
      - "\U000F140B"  # mdi-lightning-bolt (power / energy)
      - "\U000F07E4"  # mdi-molecule-co2 (CO₂ / air quality)
      - "\U000F0F54"  # mdi-home-thermometer
      - "\U000F00DE"  # mdi-brightness-5 (illuminance)
      - "\U000F05A8"  # mdi-white-balance-sunny (illuminance / lux)
      - "\U000F0D91"  # mdi-motion-sensor (occupancy)
      - "\U000F0425"  # mdi-power
      - "\U000F0241"  # mdi-flash (electricity)
      - "\U000F0150"  # mdi-clock-outline (duration / uptime)
      - "\U000F095B"  # mdi-sine-wave (AC waveform)
      - "\U000F1480"  # mdi-current-ac (electrical current)
      - "\U000F070E"  # mdi-run (activity / step count)
      - "\U000F0583"  # mdi-walk (activity / step count)
      - "\U000F0079"  # mdi-battery
      - "\U000F12A3"  # mdi-battery-high
      - "\U000F12A2"  # mdi-battery-medium
      - "\U000F12A1"  # mdi-battery-low
      - "\U000F0A72"  # mdi-solar-power
      - "\U000F1A73"  # mdi-solar-power-variant
      - "\U000F0B6C"  # mdi-car-electric
      - "\U000F1901"  # mdi-home-battery
      - "\U000F0819"  # mdi-delete-restore
      - "\U000F0A79"  # mdi-trash-can
      - "\U000F0590"  # mdi-weather-cloudy
      - "\U000F0591"  # mdi-weather-fog
      - "\U000F0592"  # mdi-weather-hail
      - "\U000F0593"  # mdi-weather-lightning
      - "\U000F0594"  # mdi-weather-night
      - "\U000F0595"  # mdi-weather-partly-cloudy
      - "\U000F0596"  # mdi-weather-pouring
      - "\U000F0597"  # mdi-weather-rainy
      - "\U000F0598"  # mdi-weather-snowy
      - "\U000F0599"  # mdi-weather-sunny
      - "\U000F059F"  # mdi-weather-windy-variant
      - "\U000F067E"  # mdi-weather-lightning-rainy
      - "\U000F067F"  # mdi-weather-snowy-rainy
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font_small
    size: 28
    bpp: 4
    glyphs:
      - "\U000F0415"  # mdi-plus
      - "\U000F0374"  # mdi-minus
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font_large
    size: 50
    bpp: 4
    glyphs:
      - "\U000F040A"  # mdi-play
      - "\U000F03E4"  # mdi-pause
      - "\U000F04AE"  # mdi-skip-previous
      - "\U000F04AD"  # mdi-skip-next
      - "\U000F02D1"  # mdi-heart
      - "\U000F02D5"  # mdi-heart-outline
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font_setup
    size: 64
    bpp: 4
    glyphs:
      - "\U000F05A9"  # mdi-wifi
      - "\U000F07D0"  # mdi-home-assistant
      - "\U000F0118"  # mdi-cast
      - "\U000F0565"  # mdi-shield-check

