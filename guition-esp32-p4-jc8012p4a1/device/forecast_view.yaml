# =============================================================================
# FORECAST VIEW — 7-day weather forecast page
# =============================================================================
# Layout (1280×740, navbar at y=740):
#
#   y=  0.. 40  Day name labels  ("MON", "TUE"…)  roboto_light26_font  0x888888
#   y= 40.. 88  Date number labels ("29", "30"…)   roboto_light40_font  0xAAAAAA
#   y= 88.. 90  Thin horizontal separator           0x2A2A2A
#   y= 90..450  Temperature lv_chart (height=360)
#                 pad_left=91, pad_right=91 → 7 points land at column centres
#                 pad_top=40,  pad_bottom=20 → content y 130..430
#                 High series 0x6CB4F0 · Low series 0x4B78B0
#                 Temp labels float above/below each dot
#   y=450..452  Thin horizontal separator
#   y=452..548  Precipitation bars (max h=90 px, bottom-aligned to y=548)
#   y=552..578  Precip mm labels    roboto_light26_font  0x8888AA
#   y=582..608  Precip % labels     roboto_light26_font  0x666688
#   y=614..660  Condition icons     icon_font (40 px)    0xAAAAAA
#
# 7 columns, each 183 px wide (last 182 px).
# Column centres:  91  274  457  640  823  1006  1189  (= i*183 + 91)
# Column separators at x = 183, 366, 549, 732, 915, 1098.
#
# Data source: wf_data_buf (forecast_sensors.yaml).
# fetch_forecast → wf_data_buf → render_forecast.
# =============================================================================

globals:
  - id: wf_today_col
    type: int
    restore_value: false
    initial_value: '-1'


script:
  # ---------------------------------------------------------------------------
  # render_forecast
  # Parses wf_data_buf and updates every widget on forecast_page.
  # Called by fetch_forecast after a successful HTTP fetch.
  # ---------------------------------------------------------------------------
  - id: render_forecast
    mode: single
    then:
      - lambda: |-
          // ── Widget arrays ──────────────────────────────────────────────────
          lv_obj_t *col_bg[7] = {
            id(wf_col_bg_0), id(wf_col_bg_1), id(wf_col_bg_2), id(wf_col_bg_3),
            id(wf_col_bg_4), id(wf_col_bg_5), id(wf_col_bg_6)
          };
          lv_obj_t *day_lbl[7] = {
            id(wf_day_0), id(wf_day_1), id(wf_day_2), id(wf_day_3),
            id(wf_day_4), id(wf_day_5), id(wf_day_6)
          };
          lv_obj_t *date_lbl[7] = {
            id(wf_date_0), id(wf_date_1), id(wf_date_2), id(wf_date_3),
            id(wf_date_4), id(wf_date_5), id(wf_date_6)
          };
          lv_obj_t *high_lbl[7] = {
            id(wf_high_lbl_0), id(wf_high_lbl_1), id(wf_high_lbl_2), id(wf_high_lbl_3),
            id(wf_high_lbl_4), id(wf_high_lbl_5), id(wf_high_lbl_6)
          };
          lv_obj_t *low_lbl[7] = {
            id(wf_low_lbl_0), id(wf_low_lbl_1), id(wf_low_lbl_2), id(wf_low_lbl_3),
            id(wf_low_lbl_4), id(wf_low_lbl_5), id(wf_low_lbl_6)
          };
          lv_obj_t *prec_bar[7] = {
            id(wf_precip_bar_0), id(wf_precip_bar_1), id(wf_precip_bar_2), id(wf_precip_bar_3),
            id(wf_precip_bar_4), id(wf_precip_bar_5), id(wf_precip_bar_6)
          };
          lv_obj_t *mm_lbl[7] = {
            id(wf_mm_lbl_0), id(wf_mm_lbl_1), id(wf_mm_lbl_2), id(wf_mm_lbl_3),
            id(wf_mm_lbl_4), id(wf_mm_lbl_5), id(wf_mm_lbl_6)
          };
          lv_obj_t *pct_lbl[7] = {
            id(wf_pct_lbl_0), id(wf_pct_lbl_1), id(wf_pct_lbl_2), id(wf_pct_lbl_3),
            id(wf_pct_lbl_4), id(wf_pct_lbl_5), id(wf_pct_lbl_6)
          };
          lv_obj_t *icon_lbl[7] = {
            id(wf_icon_0), id(wf_icon_1), id(wf_icon_2), id(wf_icon_3),
            id(wf_icon_4), id(wf_icon_5), id(wf_icon_6)
          };

          // ── Constants ──────────────────────────────────────────────────────
          const int COL_W       = 183;
          const int CHART_Y     = 90;   // chart widget screen y
          const int BAR_BOTTOM  = 548;  // bottom of precipitation bar area
          const int BAR_MAX_H   = 90;
          const int BAR_W       = 80;
          const int MM_LBL_Y    = 552;
          const int PCT_LBL_Y   = 582;
          const int ICON_Y      = 614;

          // ── Parse wf_data_buf ──────────────────────────────────────────────
          // Format: "DAYNAME|DAYNUM|HIGH|LOW|PRECIP|PROB|COND\n"
          struct DayData {
            char  day_name[4];
            int   day_num;
            float high;
            float low;
            float precip;
            int   prob;
            char  cond[32];
            bool  valid;
          } days[7] = {};

          int n_days = 0;
          const std::string &buf = id(wf_data_buf);
          size_t pos = 0;

          while (pos < buf.size() && n_days < 7) {
            size_t nl = buf.find('\n', pos);
            if (nl == std::string::npos) nl = buf.size();
            if (nl > pos) {
              std::string line = buf.substr(pos, nl - pos);
              // Split by '|' into 7 fields
              char fld[7][64] = {};
              int fi = 0;
              size_t f0 = 0;
              while (fi < 7 && f0 <= line.size()) {
                size_t f1 = line.find('|', f0);
                if (f1 == std::string::npos) f1 = line.size();
                size_t len = std::min((size_t)63, f1 - f0);
                strncpy(fld[fi], line.c_str() + f0, len);
                fi++;
                f0 = f1 + 1;
              }
              if (fi >= 7) {
                DayData &d = days[n_days];
                strncpy(d.day_name, fld[0], 3); d.day_name[3] = '\0';
                d.day_num = atoi(fld[1]);
                d.high    = atof(fld[2]);
                d.low     = atof(fld[3]);
                d.precip  = atof(fld[4]);
                d.prob    = atoi(fld[5]);
                strncpy(d.cond, fld[6], 31); d.cond[31] = '\0';
                d.valid   = true;
                n_days++;
              }
            }
            pos = nl + 1;
          }

          // ── No data fallback ───────────────────────────────────────────────
          if (n_days == 0) {
            lv_obj_add_flag(id(wf_line_high), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(wf_line_low),  LV_OBJ_FLAG_HIDDEN);
            for (int i = 0; i < 7; i++) {
              lv_obj_set_style_bg_opa(col_bg[i], LV_OPA_TRANSP, 0);
              lv_label_set_text(day_lbl[i],  "---");
              lv_label_set_text(date_lbl[i], "-");
              lv_label_set_text(high_lbl[i], "");
              lv_label_set_text(low_lbl[i],  "");
              lv_obj_set_size(prec_bar[i], BAR_W, 1);
              lv_label_set_text(mm_lbl[i],  "");
              lv_label_set_text(pct_lbl[i], "");
              lv_label_set_text(icon_lbl[i], "");
            }
            return;
          }

          // ── Identify today's column ────────────────────────────────────────
          int today_col = -1;
          auto now = id(ha_time).now();
          if (now.is_valid()) {
            for (int i = 0; i < n_days; i++) {
              if (days[i].valid && days[i].day_num == now.day_of_month) {
                today_col = i;
                break;
              }
            }
          }
          id(wf_today_col) = today_col;

          // ── Compute chart y-range ──────────────────────────────────────────
          float min_t = 999.0f, max_t = -999.0f;
          float max_precip = 0.0f;
          for (int i = 0; i < n_days; i++) {
            if (!days[i].valid) continue;
            if (days[i].low  < min_t) min_t = days[i].low;
            if (days[i].high > max_t) max_t = days[i].high;
            if (days[i].precip > max_precip) max_precip = days[i].precip;
          }
          int chart_min = (int)floorf(min_t) - 2;
          int chart_max = (int)ceilf(max_t)  + 3;
          if (max_precip < 2.0f) max_precip = 2.0f;

          // ── Build lv_line point arrays ─────────────────────────────────────
          // Chart content area: x_start=91, y_start=130 (90+40), w=1098, h=300 (360-40-20)
          // Point x for column i: 91 + 1098*i/6
          // Point y for value v:  130 + 300*(chart_max - v)/(chart_max - chart_min)
          int range = chart_max - chart_min;
          if (range <= 0) range = 1;
          static lv_point_t high_pts[7];
          static lv_point_t low_pts[7];
          for (int i = 0; i < n_days; i++) {
            int px = 91 + 1098 * i / 6;
            high_pts[i] = {(lv_coord_t)px,
                           (lv_coord_t)(130 + 300 * (chart_max - (int)roundf(days[i].high)) / range)};
            low_pts[i]  = {(lv_coord_t)px,
                           (lv_coord_t)(130 + 300 * (chart_max - (int)roundf(days[i].low))  / range)};
          }
          lv_line_set_points(id(wf_line_high), high_pts, n_days);
          lv_line_set_points(id(wf_line_low),  low_pts,  n_days);
          lv_obj_clear_flag(id(wf_line_high), LV_OBJ_FLAG_HIDDEN);
          lv_obj_clear_flag(id(wf_line_low),  LV_OBJ_FLAG_HIDDEN);

          // ── Per-column updates ─────────────────────────────────────────────
          for (int i = 0; i < 7; i++) {
            bool valid    = (i < n_days && days[i].valid);
            bool is_today = (i == today_col);
            int  col_cx   = i * COL_W + COL_W / 2;  // column centre x

            // Column highlight
            lv_obj_set_style_bg_opa(col_bg[i], is_today ? 20 : LV_OPA_TRANSP, 0);

            if (!valid) {
              lv_label_set_text(day_lbl[i],  "");
              lv_label_set_text(date_lbl[i], "");
              lv_label_set_text(high_lbl[i], "");
              lv_label_set_text(low_lbl[i],  "");
              lv_obj_set_size(prec_bar[i], BAR_W, 1);
              lv_obj_set_style_bg_opa(prec_bar[i], LV_OPA_TRANSP, 0);
              lv_label_set_text(mm_lbl[i],  "");
              lv_label_set_text(pct_lbl[i], "");
              lv_label_set_text(icon_lbl[i], "");
              continue;
            }

            DayData &d = days[i];

            // ── Header labels ──
            lv_label_set_text(day_lbl[i], d.day_name);
            lv_obj_set_style_text_color(day_lbl[i],
                lv_color_hex(is_today ? 0x6CB4F0U : 0x888888U), 0);

            char num_buf[4];
            snprintf(num_buf, sizeof(num_buf), "%d", d.day_num);
            lv_label_set_text(date_lbl[i], num_buf);
            lv_obj_set_style_text_color(date_lbl[i],
                lv_color_hex(is_today ? 0xFFFFFFU : 0xAAAAAAU), 0);

            // ── Temperature labels — same geometry as line points ──
            int px      = 91 + 1098 * i / 6;
            int py_high = 130 + 300 * (chart_max - (int)roundf(d.high)) / range;
            int py_low  = 130 + 300 * (chart_max - (int)roundf(d.low))  / range;

            char t_buf[8];
            // High label — centred above the dot
            snprintf(t_buf, sizeof(t_buf), "%d\xc2\xb0", (int)roundf(d.high));
            lv_label_set_text(high_lbl[i], t_buf);
            lv_obj_set_pos(high_lbl[i], px - 22, py_high - 36);

            // Low label — centred below the dot
            snprintf(t_buf, sizeof(t_buf), "%d\xc2\xb0", (int)roundf(d.low));
            lv_label_set_text(low_lbl[i], t_buf);
            lv_obj_set_pos(low_lbl[i], px - 22, py_low + 8);

            // ── Precipitation bar ──
            int bar_h = 0;
            if (d.precip > 0.01f)
              bar_h = std::max(3, (int)(d.precip / max_precip * BAR_MAX_H));
            int bar_x = col_cx - BAR_W / 2;
            int bar_y = BAR_BOTTOM - bar_h;
            lv_obj_set_pos(prec_bar[i], bar_x, bar_y);
            lv_obj_set_size(prec_bar[i], BAR_W, std::max(1, bar_h));
            // Opacity: low probability = faint; 100% = fully opaque
            lv_obj_set_style_bg_opa(prec_bar[i],
                (lv_opa_t)std::min(255, 60 + d.prob * 195 / 100), 0);

            // ── Precipitation text labels ──
            char mm_buf[16];
            if (d.precip < 0.05f) {
              snprintf(mm_buf, sizeof(mm_buf), "\xe2\x80\x94");   // em-dash
            } else {
              snprintf(mm_buf, sizeof(mm_buf), "%.1f mm", d.precip);
            }
            lv_label_set_text(mm_lbl[i], mm_buf);
            lv_obj_set_x(mm_lbl[i], col_cx - 30);
            lv_obj_set_y(mm_lbl[i], MM_LBL_Y);

            char pct_buf[8];
            snprintf(pct_buf, sizeof(pct_buf), "%d%%", d.prob);
            lv_label_set_text(pct_lbl[i], pct_buf);
            lv_obj_set_x(pct_lbl[i], col_cx - 16);
            lv_obj_set_y(pct_lbl[i], PCT_LBL_Y);

            // ── Condition icon ──
            const char *icon_str;
            std::string c = d.cond;
            if      (c == "sunny" || c == "clear-day")  icon_str = "\U000F0599";
            else if (c == "clear-night")                 icon_str = "\U000F0594";
            else if (c == "partlycloudy")               icon_str = "\U000F0595";
            else if (c == "cloudy")                     icon_str = "\U000F0590";
            else if (c == "fog")                        icon_str = "\U000F0591";
            else if (c == "hail")                       icon_str = "\U000F0592";
            else if (c == "lightning")                  icon_str = "\U000F0593";
            else if (c == "lightning-rainy")            icon_str = "\U000F067E";
            else if (c == "rainy" || c == "drizzle")    icon_str = "\U000F0597";
            else if (c == "pouring")                    icon_str = "\U000F0596";
            else if (c == "snowy")                      icon_str = "\U000F0598";
            else if (c == "snowy-rainy")                icon_str = "\U000F067F";
            else if (c == "windy")                      icon_str = "\U000F059E";
            else if (c == "windy-variant")              icon_str = "\U000F059F";
            else                                         icon_str = "\U000F0590";  // cloudy fallback

            lv_label_set_text(icon_lbl[i], icon_str);
            lv_obj_set_x(icon_lbl[i], col_cx - 22);
            lv_obj_set_y(icon_lbl[i], ICON_Y);
          }


lvgl:
