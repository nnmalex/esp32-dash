# =============================================================================
# CALENDAR SENSORS — HA subscription for up to three calendar entities
# =============================================================================
# Each slot subscribes to a calendar.* entity's state + attributes:
#   message    → event title
#   start_time → "YYYY-MM-DD HH:MM:SS" (or "YYYY-MM-DD" for all-day)
#   end_time   → "YYYY-MM-DD HH:MM:SS" (used to detect past events)
#   all_day    → "True"/"False"
#   location   → description line (calendar page only)
#
# Updates calendar page labels (cal_time_label_N, cal_title_label_N,
# cal_desc_label_N) AND the idle page agenda via render_idle_agenda.
#
# fetch_idle_agenda fetches today+tomorrow events from all three calendar
# entities via the HA REST API, stores them in idle_events_buf (pipe-delimited),
# then calls render_idle_agenda to populate idle_agenda_slot_0..4 (up to 5
# events sorted by start_time, past events greyed). Falls back to subscription
# globals when ha_token is not configured.
#
# Follows the generation-counter pattern from media_player_select.yaml.
# =============================================================================

substitutions:
  calendar_entity_1: ""
  calendar_entity_2: ""
  calendar_entity_3: ""


# -----------------------------------------------------------------------------
# Raw attribute storage — updated by subscription callbacks before label render
# -----------------------------------------------------------------------------
globals:
  - id: cal_title_0
    type: std::string
    initial_value: '""'
  - id: cal_start_0
    type: std::string
    initial_value: '""'
  - id: cal_end_0
    type: std::string
    initial_value: '""'
  - id: cal_all_day_0
    type: std::string
    initial_value: '""'

  - id: cal_title_1
    type: std::string
    initial_value: '""'
  - id: cal_start_1
    type: std::string
    initial_value: '""'
  - id: cal_end_1
    type: std::string
    initial_value: '""'
  - id: cal_all_day_1
    type: std::string
    initial_value: '""'

  - id: cal_title_2
    type: std::string
    initial_value: '""'
  - id: cal_start_2
    type: std::string
    initial_value: '""'
  - id: cal_end_2
    type: std::string
    initial_value: '""'
  - id: cal_all_day_2
    type: std::string
    initial_value: '""'

  - id: cal_sub_gen_0
    type: int
    initial_value: '0'
  - id: cal_sub_gen_1
    type: int
    initial_value: '0'
  - id: cal_sub_gen_2
    type: int
    initial_value: '0'

  # HTTP fetch buffers (used by fetch_calendar_week)
  - id: cal_events_buf
    type: std::string
    initial_value: '""'
  - id: cal_fetch_start   # "YYYY-MM-DDTHH:MM:SS" for the API query start
    type: std::string
    initial_value: '""'
  - id: cal_fetch_end
    type: std::string
    initial_value: '""'

  # HTTP fetch buffers (used by fetch_idle_agenda — idle page agenda)
  - id: idle_events_buf
    type: std::string
    initial_value: '""'
  - id: idle_fetch_start
    type: std::string
    initial_value: '""'
  - id: idle_fetch_end
    type: std::string
    initial_value: '""'


# -----------------------------------------------------------------------------
# Entity selector text entities (NVS-persisted, visible in device settings)
# -----------------------------------------------------------------------------
text:
  - platform: template
    name: "Calendar 1 Entity"
    id: calendar_entity_select_0
    entity_category: config
    icon: "mdi:calendar"
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "${calendar_entity_1}"
    min_length: 0
    max_length: 100
    on_value:
      - script.execute: {id: subscribe_calendar, slot: 0}

  - platform: template
    name: "Calendar 2 Entity"
    id: calendar_entity_select_1
    entity_category: config
    icon: "mdi:calendar"
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "${calendar_entity_2}"
    min_length: 0
    max_length: 100
    on_value:
      - script.execute: {id: subscribe_calendar, slot: 1}

  - platform: template
    name: "Calendar 3 Entity"
    id: calendar_entity_select_2
    entity_category: config
    icon: "mdi:calendar"
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "${calendar_entity_3}"
    min_length: 0
    max_length: 100
    on_value:
      - script.execute: {id: subscribe_calendar, slot: 2}


# -----------------------------------------------------------------------------
# Subscription scripts
# -----------------------------------------------------------------------------
script:

  # ---------------------------------------------------------------------------
  # render_idle_agenda
  # ---------------------------------------------------------------------------
  # Populates idle_agenda_slot_0..4 from idle_events_buf (fetched by
  # fetch_idle_agenda via HTTP API). Falls back to subscription globals
  # (cal_title/start/end_N) when the buffer is empty (no ha_token set).
  # Past events are greyed out; up to 20 events collected before slot capping.
  # Called by fetch_idle_agenda (after fetch), update_idle_clock (re-render),
  # and calendar subscription callbacks (re-render from existing buffer).
  # ---------------------------------------------------------------------------
  - id: render_idle_agenda
    mode: single
    then:
      - lambda: |-
          auto now_time = id(ha_time).now();
          if (!now_time.is_valid()) return;

          // Build ISO date strings for today and tomorrow
          char today_str[11], tomorrow_str[11];
          snprintf(today_str, sizeof(today_str), "%04d-%02d-%02d",
                   now_time.year, now_time.month, now_time.day_of_month);

          time_t ts_tomorrow = now_time.timestamp + 86400;
          struct tm tm_buf;
          localtime_r(&ts_tomorrow, &tm_buf);
          snprintf(tomorrow_str, sizeof(tomorrow_str), "%04d-%02d-%02d",
                   tm_buf.tm_year + 1900, tm_buf.tm_mon + 1, tm_buf.tm_mday);

          // Build now datetime string for past-event comparison ("YYYY-MM-DD HH:MM:SS")
          char now_dt[20];
          snprintf(now_dt, sizeof(now_dt), "%04d-%02d-%02d %02d:%02d:%02d",
                   now_time.year, now_time.month, now_time.day_of_month,
                   now_time.hour, now_time.minute, now_time.second);

          // Calendar accent colors (matching calendar page slots)
          const uint32_t CAL_COLORS[3] = {0x4A90E2, 0x5BA55A, 0xE2914A};

          // Agenda item struct — fixed char buffers to avoid heap allocation
          struct AgendaItem {
            char start[20];       // "YYYY-MM-DD HH:MM:SS\0" (normalized, space sep)
            char title[64];
            char time_label[48];  // "Tomorrow · 12:00 PM\0"
            uint32_t accent_color;
            bool is_past;
          };

          // Allow up to 20 items (all today+tomorrow events across 3 calendars)
          AgendaItem items[20];
          int item_count = 0;
          memset(items, 0, sizeof(items));

          // Helper: build a time_label string and add to items[].
          auto add_item = [&](
              const char *title_c,
              std::string start,   // mutable copy — we normalize T→space
              const std::string &end_s_in,
              bool is_allday,
              int cal_idx) {

            if (!title_c || title_c[0] == '\0') return;
            if (start.length() < 10) return;
            if (item_count >= 20) return;

            bool is_today    = (strncmp(start.c_str(), today_str, 10) == 0);
            bool is_tomorrow = (strncmp(start.c_str(), tomorrow_str, 10) == 0);
            if (!is_today && !is_tomorrow) return;

            // Normalize T separator → space for consistent ISO comparison
            if (start.length() >= 11 && start[10] == 'T') start[10] = ' ';
            std::string end_s = end_s_in;
            if (end_s.length() >= 11 && end_s[10] == 'T') end_s[10] = ' ';

            // Is past?
            bool is_past = false;
            if (!is_allday && end_s.length() >= 19) {
              is_past = (strncmp(end_s.c_str(), now_dt, 19) < 0);
            }

            // Build human-readable time label  e.g. "Today · 9:00 AM"
            const char *day_prefix = is_today ? "Today" : "Tomorrow";
            char time_buf[48];
            if (is_allday) {
              snprintf(time_buf, sizeof(time_buf), "%s \xc2\xb7 All Day", day_prefix);
            } else if (start.length() >= 16) {
              int sh   = atoi(start.c_str() + 11);
              int smin = atoi(start.c_str() + 14);
              if (end_s.length() >= 16) {
                int eh   = atoi(end_s.c_str() + 11);
                int emin = atoi(end_s.c_str() + 14);
                snprintf(time_buf, sizeof(time_buf), "%s \xc2\xb7 %02d:%02d\xe2\x80\x93%02d:%02d",
                         day_prefix, sh, smin, eh, emin);
              } else {
                snprintf(time_buf, sizeof(time_buf), "%s \xc2\xb7 %02d:%02d",
                         day_prefix, sh, smin);
              }
            } else {
              snprintf(time_buf, sizeof(time_buf), "%s", day_prefix);
            }

            AgendaItem &item = items[item_count++];
            strncpy(item.start,      start.c_str(),  sizeof(item.start)      - 1);
            strncpy(item.title,      title_c,         sizeof(item.title)      - 1);
            strncpy(item.time_label, time_buf,        sizeof(item.time_label) - 1);
            item.accent_color = (cal_idx >= 0 && cal_idx < 3) ? CAL_COLORS[cal_idx] : 0x888888U;
            item.is_past = is_past;
          };

          if (!id(idle_events_buf).empty()) {
            // --- Primary path: parse HTTP-fetched buffer ---
            // Format: "CAL_IDX|TITLE|START|END|ALLDAY\n" (repeated)
            const std::string &buf = id(idle_events_buf);
            size_t pos = 0;
            while (pos < buf.size() && item_count < 20) {
              size_t nl = buf.find('\n', pos);
              if (nl == std::string::npos) nl = buf.size();
              if (nl > pos) {
                std::string line = buf.substr(pos, nl - pos);
                // Parse pipe-delimited fields
                size_t p1 = line.find('|');
                size_t p2 = (p1 != std::string::npos) ? line.find('|', p1 + 1) : std::string::npos;
                size_t p3 = (p2 != std::string::npos) ? line.find('|', p2 + 1) : std::string::npos;
                size_t p4 = (p3 != std::string::npos) ? line.find('|', p3 + 1) : std::string::npos;
                if (p4 != std::string::npos) {
                  int cal_idx      = atoi(line.c_str());
                  std::string title = line.substr(p1 + 1, p2 - p1 - 1);
                  std::string start = line.substr(p2 + 1, p3 - p2 - 1);
                  std::string end_s = line.substr(p3 + 1, p4 - p3 - 1);
                  bool is_allday   = (line.substr(p4 + 1) == "1");
                  add_item(title.c_str(), start, end_s, is_allday, cal_idx);
                }
              }
              pos = nl + 1;
            }
          } else {
            // --- Fallback path: subscription globals (one event per calendar) ---
            // Used when ha_token is not configured and no fetch has run.
            auto add_sub = [&](
                const std::string &title,
                const std::string &start,
                const std::string &end_s,
                const std::string &all_day_s,
                int cal_idx) {
              bool is_allday = (all_day_s == "True" || all_day_s == "true" || all_day_s == "1");
              add_item(title.c_str(), start, end_s, is_allday, cal_idx);
            };
            add_sub(id(cal_title_0), id(cal_start_0), id(cal_end_0), id(cal_all_day_0), 0);
            add_sub(id(cal_title_1), id(cal_start_1), id(cal_end_1), id(cal_all_day_1), 1);
            add_sub(id(cal_title_2), id(cal_start_2), id(cal_end_2), id(cal_all_day_2), 2);
          }

          // Sort by start time (ISO string comparison: "YYYY-MM-DD HH:MM:SS")
          for (int i = 0; i < item_count - 1; i++) {
            for (int j = i + 1; j < item_count; j++) {
              if (strcmp(items[j].start, items[i].start) < 0) {
                AgendaItem tmp = items[i];
                items[i] = items[j];
                items[j] = tmp;
              }
            }
          }

          // Widget pointer arrays for agenda slots 0..4
          lv_obj_t *slot_objs[] = {
            id(idle_agenda_slot_0), id(idle_agenda_slot_1), id(idle_agenda_slot_2),
            id(idle_agenda_slot_3), id(idle_agenda_slot_4)
          };
          lv_obj_t *accent_objs[] = {
            id(idle_agenda_accent_0), id(idle_agenda_accent_1), id(idle_agenda_accent_2),
            id(idle_agenda_accent_3), id(idle_agenda_accent_4)
          };
          lv_obj_t *time_labels[] = {
            id(idle_agenda_time_0), id(idle_agenda_time_1), id(idle_agenda_time_2),
            id(idle_agenda_time_3), id(idle_agenda_time_4)
          };
          lv_obj_t *title_labels[] = {
            id(idle_agenda_title_0), id(idle_agenda_title_1), id(idle_agenda_title_2),
            id(idle_agenda_title_3), id(idle_agenda_title_4)
          };

          for (int i = 0; i < 5; i++) {
            if (i < item_count) {
              const AgendaItem &item = items[i];
              lv_obj_clear_flag(slot_objs[i], LV_OBJ_FLAG_HIDDEN);

              uint32_t accent_col = item.is_past ? 0x444444U : item.accent_color;
              uint32_t time_col   = item.is_past ? 0x444444U : item.accent_color;
              uint32_t title_col  = item.is_past ? 0x555555U : 0xDDDDDDU;

              lv_obj_set_style_bg_color(accent_objs[i], lv_color_hex(accent_col), 0);
              lv_obj_set_style_text_color(time_labels[i], lv_color_hex(time_col), 0);
              lv_obj_set_style_text_color(title_labels[i], lv_color_hex(title_col), 0);
              lv_label_set_text(time_labels[i], item.time_label);
              lv_label_set_text(title_labels[i], item.title);
            } else {
              lv_obj_add_flag(slot_objs[i], LV_OBJ_FLAG_HIDDEN);
            }
          }

  # ---------------------------------------------------------------------------
  # fetch_idle_agenda
  # ---------------------------------------------------------------------------
  # Entry point for fetching all today+tomorrow events for the idle agenda.
  # Computes a 2-day window (today T00:00:00 → day-after-tomorrow T00:00:00),
  # clears idle_events_buf, then chains through fetch_idle_http(0→1→2) before
  # calling render_idle_agenda.
  # Called by show_idle_view (navbar.yaml) and hourly from idle_view.yaml.
  # ---------------------------------------------------------------------------
  - id: fetch_idle_agenda
    mode: restart
    then:
      - lambda: |-
          auto t = id(ha_time).now();
          if (!t.is_valid()) {
            ESP_LOGW("idle_fetch", "Time not valid, skipping fetch");
            id(render_idle_agenda).execute();
            return;
          }

          // Window: today 00:00 → day-after-tomorrow 00:00 (covers today + tomorrow)
          time_t base_ts = t.timestamp - (t.hour * 3600 + t.minute * 60 + t.second);
          time_t end_ts  = base_ts + 2L * 86400L;

          struct tm start_tm, end_tm;
          localtime_r(&base_ts, &start_tm);
          localtime_r(&end_ts,  &end_tm);

          char s[21], e[21];
          snprintf(s, sizeof(s), "%04d-%02d-%02dT00:00:00",
                   start_tm.tm_year + 1900, start_tm.tm_mon + 1, start_tm.tm_mday);
          snprintf(e, sizeof(e), "%04d-%02d-%02dT00:00:00",
                   end_tm.tm_year + 1900,   end_tm.tm_mon + 1,   end_tm.tm_mday);

          id(idle_fetch_start) = std::string(s);
          id(idle_fetch_end)   = std::string(e);
          id(idle_events_buf)  = "";

          ESP_LOGI("idle_fetch", "Window %s .. %s", s, e);
      - script.execute: fetch_idle_http_0

  # ---------------------------------------------------------------------------
  # fetch_idle_http_0/1/2: one script per calendar slot, chained sequentially.
  # Separate scripts avoid the mode:single self-call deadlock of parameterized scripts.
  # ---------------------------------------------------------------------------
  - id: fetch_idle_http_0
    mode: single
    then:
      - if:
          condition:
            lambda: |-
              std::string e = id(calendar_entity_select_0).state;
              return !e.empty() && e.length() > 9 && e.substr(0,9) == "calendar."
                     && !id(ha_token_global).empty();
          then:
            - lambda: |-
                std::string entity = id(calendar_entity_select_0).state;
                std::string token = id(ha_token_global);
                std::string url =
                    id(ha_base_url) + "/api/calendars/" + entity +
                    "?start=" + id(idle_fetch_start) + "&end=" + id(idle_fetch_end);

                std::list<esphome::http_request::Header> hdrs;
                std::string auth = "Bearer " + token;
                hdrs.push_back({"Authorization", auth.c_str()});

                ESP_LOGI("idle_fetch", "GET cal 0: %s", url.c_str());
                auto container = id(http_req)->get(url, hdrs);
                if (!container || container->status_code != 200) {
                  ESP_LOGW("idle_fetch", "cal0 HTTP %d",
                           container ? container->status_code : -1);
                  if (container) container->end();
                  return;
                }

                std::string body;
                body.reserve(4096);
                uint8_t buf[512];
                int n;
                while ((n = container->read(buf, sizeof(buf))) > 0)
                  body.append(reinterpret_cast<char*>(buf), n);
                container->end();

                {
                  const int cal_idx = 0;
                  const char *p = body.c_str();
                  int depth = 0;
                  const char *ev_start = nullptr;
                  while (*p) {
                    if (*p == '{') { if (++depth == 1) ev_start = p; }
                    else if (*p == '}' && depth-- == 1 && ev_start) {
                      std::string ev(ev_start, p + 1);
                      ev_start = nullptr;

                      const char *sk = strstr(ev.c_str(), "\"summary\":");
                      if (!sk) { p++; continue; }
                      const char *q1 = strchr(sk + 10, '"');
                      if (!q1) { p++; continue; }
                      q1++;
                      const char *q2 = q1;
                      while (*q2 && *q2 != '"') { if (*q2 == '\\') q2++; q2++; }
                      std::string title(q1, q2);
                      for (auto &c : title) if (c == '|') c = ' ';
                      if (title.empty()) { p++; continue; }

                      bool allday = false;
                      char start_val[25] = "", end_val[25] = "";
                      const char *stk = strstr(ev.c_str(), "\"start\":");
                      if (stk) {
                        const char *dt = strstr(stk, "\"dateTime\":");
                        const char *d  = strstr(stk, "\"date\":");
                        if (dt && (!d || dt < d)) {
                          const char *v1 = strchr(dt + 11, '"'); if (v1) v1++;
                          if (v1) { const char *v2 = strchr(v1, '"');
                                    if (v2) strncpy(start_val, v1, std::min((int)(v2-v1), 19)); }
                        } else if (d) {
                          allday = true;
                          const char *v1 = strchr(d + 7, '"'); if (v1) v1++;
                          if (v1) { const char *v2 = strchr(v1, '"');
                                    if (v2) strncpy(start_val, v1, std::min((int)(v2-v1), 10)); }
                        }
                      }
                      if (start_val[0] == '\0') { p++; continue; }

                      const char *enk = strstr(ev.c_str(), "\"end\":");
                      if (enk && !allday) {
                        const char *dt = strstr(enk, "\"dateTime\":");
                        if (dt) {
                          const char *v1 = strchr(dt + 11, '"'); if (v1) v1++;
                          if (v1) { const char *v2 = strchr(v1, '"');
                                    if (v2) strncpy(end_val, v1, std::min((int)(v2-v1), 19)); }
                        }
                      }

                      char line[300];
                      snprintf(line, sizeof(line), "%d|%s|%s|%s|%d\n",
                               cal_idx, title.c_str(), start_val, end_val, allday ? 1 : 0);
                      id(idle_events_buf) += line;
                    }
                    p++;
                  }
                  ESP_LOGI("idle_fetch", "cal0 parsed OK, buf len=%d",
                           (int)id(idle_events_buf).length());
                }
      - script.execute: fetch_idle_http_1

  - id: fetch_idle_http_1
    mode: single
    then:
      - if:
          condition:
            lambda: |-
              std::string e = id(calendar_entity_select_1).state;
              return !e.empty() && e.length() > 9 && e.substr(0,9) == "calendar."
                     && !id(ha_token_global).empty();
          then:
            - lambda: |-
                std::string entity = id(calendar_entity_select_1).state;
                std::string token = id(ha_token_global);
                std::string url =
                    id(ha_base_url) + "/api/calendars/" + entity +
                    "?start=" + id(idle_fetch_start) + "&end=" + id(idle_fetch_end);

                std::list<esphome::http_request::Header> hdrs;
                std::string auth = "Bearer " + token;
                hdrs.push_back({"Authorization", auth.c_str()});

                ESP_LOGI("idle_fetch", "GET cal 1: %s", url.c_str());
                auto container = id(http_req)->get(url, hdrs);
                if (!container || container->status_code != 200) {
                  ESP_LOGW("idle_fetch", "cal1 HTTP %d",
                           container ? container->status_code : -1);
                  if (container) container->end();
                  return;
                }

                std::string body;
                body.reserve(4096);
                uint8_t buf[512];
                int n;
                while ((n = container->read(buf, sizeof(buf))) > 0)
                  body.append(reinterpret_cast<char*>(buf), n);
                container->end();

                {
                  const int cal_idx = 1;
                  const char *p = body.c_str();
                  int depth = 0;
                  const char *ev_start = nullptr;
                  while (*p) {
                    if (*p == '{') { if (++depth == 1) ev_start = p; }
                    else if (*p == '}' && depth-- == 1 && ev_start) {
                      std::string ev(ev_start, p + 1);
                      ev_start = nullptr;

                      const char *sk = strstr(ev.c_str(), "\"summary\":");
                      if (!sk) { p++; continue; }
                      const char *q1 = strchr(sk + 10, '"');
                      if (!q1) { p++; continue; }
                      q1++;
                      const char *q2 = q1;
                      while (*q2 && *q2 != '"') { if (*q2 == '\\') q2++; q2++; }
                      std::string title(q1, q2);
                      for (auto &c : title) if (c == '|') c = ' ';
                      if (title.empty()) { p++; continue; }

                      bool allday = false;
                      char start_val[25] = "", end_val[25] = "";
                      const char *stk = strstr(ev.c_str(), "\"start\":");
                      if (stk) {
                        const char *dt = strstr(stk, "\"dateTime\":");
                        const char *d  = strstr(stk, "\"date\":");
                        if (dt && (!d || dt < d)) {
                          const char *v1 = strchr(dt + 11, '"'); if (v1) v1++;
                          if (v1) { const char *v2 = strchr(v1, '"');
                                    if (v2) strncpy(start_val, v1, std::min((int)(v2-v1), 19)); }
                        } else if (d) {
                          allday = true;
                          const char *v1 = strchr(d + 7, '"'); if (v1) v1++;
                          if (v1) { const char *v2 = strchr(v1, '"');
                                    if (v2) strncpy(start_val, v1, std::min((int)(v2-v1), 10)); }
                        }
                      }
                      if (start_val[0] == '\0') { p++; continue; }

                      const char *enk = strstr(ev.c_str(), "\"end\":");
                      if (enk && !allday) {
                        const char *dt = strstr(enk, "\"dateTime\":");
                        if (dt) {
                          const char *v1 = strchr(dt + 11, '"'); if (v1) v1++;
                          if (v1) { const char *v2 = strchr(v1, '"');
                                    if (v2) strncpy(end_val, v1, std::min((int)(v2-v1), 19)); }
                        }
