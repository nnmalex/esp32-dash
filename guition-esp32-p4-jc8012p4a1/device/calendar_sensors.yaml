            lv_label_set_text(id(cal_title_label_1), "No calendar set");
            lv_label_set_text(id(cal_desc_label_1), "");
            lv_label_set_text(id(idle_cal_event_1), "\xe2\x80\x94");
            if (!entity.empty()) {
              ESP_LOGW("calendar", "Slot 1: '%s' must start with 'calendar.'", entity.c_str());
            }
            return;
          }

          if (esphome::api::global_api_server == nullptr) return;

          id(cal_sub_gen_1) += 1;
          int gen = id(cal_sub_gen_1);
          int *gen_ptr = &id(cal_sub_gen_1);

          std::string *title_ptr  = &id(cal_title_1);
          std::string *start_ptr  = &id(cal_start_1);
          std::string *allday_ptr = &id(cal_all_day_1);

          auto *api = esphome::api::global_api_server;
          using str_cb = std::function<void(const std::string &)>;

          auto fmt_time = [](const std::string &start, const std::string &all_day) -> std::string {
            if (all_day == "True" || all_day == "true" || all_day == "1") return std::string("All Day");
            if (start.length() < 16) return std::string("");
            int hour   = atoi(start.substr(11, 2).c_str());
            int minute = atoi(start.substr(14, 2).c_str());
            const char *ap = hour >= 12 ? "PM" : "AM";
            int h12 = hour % 12; if (h12 == 0) h12 = 12;
            char buf[16];
            snprintf(buf, sizeof(buf), "%d:%02d %s", h12, minute, ap);
            return std::string(buf);
          };

          auto update_idle = [title_ptr, start_ptr, allday_ptr, fmt_time]() {
            std::string title  = *title_ptr;
            std::string time_s = fmt_time(*start_ptr, *allday_ptr);
            std::string result;
            if (title.empty()) {
              result = "\xe2\x80\x94";
            } else if (time_s.empty() || time_s == "All Day") {
              result = title;
            } else {
              char buf[128];
              snprintf(buf, sizeof(buf), "%s \xe2\x80\x94 %s", time_s.c_str(), title.c_str());
              result = std::string(buf);
            }
            lv_label_set_text(id(idle_cal_event_1), result.c_str());
          };

          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("message"),
              str_cb([gen, gen_ptr, title_ptr, fmt_time, update_idle](const std::string &state) {
                if (gen != *gen_ptr) return;
                *title_ptr = state;
                lv_label_set_text(id(cal_title_label_1),
                    state.empty() ? "No upcoming events" : state.c_str());
                update_idle();
              }));

          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("start_time"),
              str_cb([gen, gen_ptr, start_ptr, allday_ptr, fmt_time, update_idle](const std::string &state) {
                if (gen != *gen_ptr) return;
                *start_ptr = state;
                std::string ts = fmt_time(state, *allday_ptr);
                lv_label_set_text(id(cal_time_label_1), ts.empty() ? "\xe2\x80\x94" : ts.c_str());
                update_idle();
              }));

          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("all_day"),
              str_cb([gen, gen_ptr, allday_ptr, start_ptr, fmt_time](const std::string &state) {
                if (gen != *gen_ptr) return;
                *allday_ptr = state;
                std::string ts = fmt_time(*start_ptr, state);
                lv_label_set_text(id(cal_time_label_1), ts.empty() ? "\xe2\x80\x94" : ts.c_str());
              }));

          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("location"),
              str_cb([gen, gen_ptr](const std::string &state) {
                if (gen != *gen_ptr) return;
                lv_label_set_text(id(cal_desc_label_1), state.c_str());
              }));

          ESP_LOGI("calendar", "Slot 1: subscribed to '%s'", entity.c_str());

  # ---------------------------------------------------------------------------
  # subscribe_calendar_2
  # ---------------------------------------------------------------------------
  - id: subscribe_calendar_2
    mode: restart
    then:
      - lambda: |-
          std::string entity = id(calendar_entity_select_2).state;

          if (entity.empty() || entity.substr(0, 9) != "calendar.") {
