  # ---------------------------------------------------------------------------
  # subscribe_calendar: subscribes to HA state + attributes of calendar slot N.
  # ---------------------------------------------------------------------------
  - id: subscribe_calendar
    parameters:
      slot: int
    mode: restart
    then:
      - lambda: |-
          std::string entity;
          switch (slot) {
            case 0: entity = id(calendar_entity_select_0).state; break;
            case 1: entity = id(calendar_entity_select_1).state; break;
            case 2: entity = id(calendar_entity_select_2).state; break;
            default: return;
          }

          // Reset slot to unconfigured state
          if (entity.empty() || entity.substr(0, 9) != "calendar.") {
            switch (slot) {
              case 0:
                id(cal_title_0) = ""; id(cal_start_0) = ""; id(cal_end_0) = ""; id(cal_all_day_0) = "";
                lv_label_set_text(id(cal_time_label_0), "\xe2\x80\x94");
                lv_label_set_text(id(cal_title_label_0), "No calendar set");
                lv_label_set_text(id(cal_desc_label_0), ""); break;
              case 1:
                id(cal_title_1) = ""; id(cal_start_1) = ""; id(cal_end_1) = ""; id(cal_all_day_1) = "";
                lv_label_set_text(id(cal_time_label_1), "\xe2\x80\x94");
                lv_label_set_text(id(cal_title_label_1), "No calendar set");
                lv_label_set_text(id(cal_desc_label_1), ""); break;
              default:
                id(cal_title_2) = ""; id(cal_start_2) = ""; id(cal_end_2) = ""; id(cal_all_day_2) = "";
                lv_label_set_text(id(cal_time_label_2), "\xe2\x80\x94");
                lv_label_set_text(id(cal_title_label_2), "No calendar set");
                lv_label_set_text(id(cal_desc_label_2), ""); break;
            }
            id(render_idle_agenda).execute();
            if (!entity.empty()) {
              ESP_LOGW("calendar", "Slot %d: '%s' must start with 'calendar.'", slot, entity.c_str());
            }
            return;
          }

          if (esphome::api::global_api_server == nullptr) return;

          // Resolve pointers to per-slot globals and labels
          int *gen_ctr;
          std::string *title_ptr, *start_ptr, *end_ptr, *allday_ptr;
          lv_obj_t *time_lbl, *title_lbl, *desc_lbl;
          switch (slot) {
            case 0:
              gen_ctr = &id(cal_sub_gen_0);
              title_ptr = &id(cal_title_0); start_ptr = &id(cal_start_0);
              end_ptr = &id(cal_end_0); allday_ptr = &id(cal_all_day_0);
              time_lbl = id(cal_time_label_0); title_lbl = id(cal_title_label_0);
              desc_lbl = id(cal_desc_label_0); break;
            case 1:
              gen_ctr = &id(cal_sub_gen_1);
              title_ptr = &id(cal_title_1); start_ptr = &id(cal_start_1);
              end_ptr = &id(cal_end_1); allday_ptr = &id(cal_all_day_1);
              time_lbl = id(cal_time_label_1); title_lbl = id(cal_title_label_1);
              desc_lbl = id(cal_desc_label_1); break;
            default:
              gen_ctr = &id(cal_sub_gen_2);
              title_ptr = &id(cal_title_2); start_ptr = &id(cal_start_2);
              end_ptr = &id(cal_end_2); allday_ptr = &id(cal_all_day_2);
              time_lbl = id(cal_time_label_2); title_lbl = id(cal_title_label_2);
              desc_lbl = id(cal_desc_label_2); break;
          }

          (*gen_ctr) += 1;
          int gen = *gen_ctr;
          int *gen_ptr = gen_ctr;

          auto *api = esphome::api::global_api_server;
          using str_cb = std::function<void(const std::string &)>;

          auto fmt_time = [](const std::string &start, const std::string &all_day) -> std::string {
            if (all_day == "True" || all_day == "true" || all_day == "1") return std::string("All Day");
            if (start.length() < 16) return std::string("");
            int hour   = atoi(start.substr(11, 2).c_str());
            int minute = atoi(start.substr(14, 2).c_str());
            const char *ap = hour >= 12 ? "PM" : "AM";
            int h12 = hour % 12; if (h12 == 0) h12 = 12;
            char buf[16];
            snprintf(buf, sizeof(buf), "%d:%02d %s", h12, minute, ap);
            return std::string(buf);
          };

          // message → title label + agenda re-render
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("message"),
              str_cb([gen, gen_ptr, title_ptr, title_lbl](const std::string &state) {
                if (gen != *gen_ptr) return;
                *title_ptr = state;
                lv_label_set_text(title_lbl, state.empty() ? "No upcoming events" : state.c_str());
                id(render_idle_agenda).execute();
              }));

          // start_time → time label + agenda re-render
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("start_time"),
              str_cb([gen, gen_ptr, start_ptr, allday_ptr, time_lbl, fmt_time](const std::string &state) {
                if (gen != *gen_ptr) return;
                *start_ptr = state;
                std::string ts = fmt_time(state, *allday_ptr);
                lv_label_set_text(time_lbl, ts.empty() ? "\xe2\x80\x94" : ts.c_str());
                id(render_idle_agenda).execute();
              }));

          // end_time → stored for past-event detection
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("end_time"),
              str_cb([gen, gen_ptr, end_ptr](const std::string &state) {
                if (gen != *gen_ptr) return;
                *end_ptr = state;
                id(render_idle_agenda).execute();
              }));

          // all_day → update time label
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("all_day"),
              str_cb([gen, gen_ptr, allday_ptr, start_ptr, time_lbl, fmt_time](const std::string &state) {
                if (gen != *gen_ptr) return;
                *allday_ptr = state;
                std::string ts = fmt_time(*start_ptr, state);
                lv_label_set_text(time_lbl, ts.empty() ? "\xe2\x80\x94" : ts.c_str());
              }));

          // location → description label (calendar page only)
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("location"),
              str_cb([gen, gen_ptr, desc_lbl](const std::string &state) {
                if (gen != *gen_ptr) return;
                lv_label_set_text(desc_lbl, state.c_str());
              }));

          ESP_LOGI("calendar", "Slot %d: subscribed to '%s'", slot, entity.c_str());

# WEEK GRID — HTTP fetch from HA calendar REST API
# =============================================================================
# fetch_calendar_week  fetches up to 6 days of events from all 3 calendar
# entities via GET /api/calendars/<entity>?start=...&end=... and populates
# cal_events_buf with pipe-delimited lines:
#   CAL_IDX|TITLE|START_ISO|END_ISO|ALLDAY\n
# render_calendar_grid (calendar_view.yaml) then reads that buffer.
#
# Requires the user to set "HA Access Token" in HA device settings to a
# Home Assistant long-lived access token.
#
# ha_base_url is built from ha_protocol / ha_host / ha_port substitutions at boot.
# ha_token is read from the ha_token_global string (set via ha_token substitution).
# =============================================================================

  # ---------------------------------------------------------------------------
  # fetch_calendar_week
  # Entry point called by show_calendar_view and the prev/next nav buttons.
  # Computes the 6-day window, clears the buffer, then chains through the
  # three per-calendar fetches sequentially before calling render_calendar_grid.
  # ---------------------------------------------------------------------------
  - id: fetch_calendar_week
    mode: restart
    then:
      - lambda: |-
          auto t = id(ha_time).now();
          if (!t.is_valid()) {
            ESP_LOGW("cal_fetch", "Time not valid, skipping fetch");
            return;
          }

          // Compute 6-day window: [today+offset, today+offset+6)
          int offset = id(cal_view_offset);
          time_t base_ts = t.timestamp + (long)offset * 86400L;
          time_t end_ts  = base_ts + 6L * 86400L;

          struct tm start_tm, end_tm;
          localtime_r(&base_ts, &start_tm);
          localtime_r(&end_ts,  &end_tm);

          char s[21], e[21];
          snprintf(s, sizeof(s), "%04d-%02d-%02dT00:00:00",
                   start_tm.tm_year + 1900, start_tm.tm_mon + 1, start_tm.tm_mday);
          snprintf(e, sizeof(e), "%04d-%02d-%02dT00:00:00",
                   end_tm.tm_year + 1900,   end_tm.tm_mon + 1,   end_tm.tm_mday);

          id(cal_fetch_start) = std::string(s);
          id(cal_fetch_end)   = std::string(e);
          id(cal_events_buf)  = "";

          ESP_LOGI("cal_fetch", "Window %s .. %s", s, e);
