# =============================================================================
# CALENDAR SENSORS — HA subscription for up to three calendar entities
# =============================================================================
# Each slot subscribes to a calendar.* entity's state + attributes:
#   message    → event title
#   start_time → "YYYY-MM-DD HH:MM:SS" (or "YYYY-MM-DD" for all-day)
#   end_time   → "YYYY-MM-DD HH:MM:SS" (used to detect past events)
#   all_day    → "True"/"False"
#   location   → description line (calendar page only)
#
# Updates calendar page labels (cal_time_label_N, cal_title_label_N,
# cal_desc_label_N) AND the idle page agenda via render_idle_agenda.
#
# render_idle_agenda collects all three slots, filters to today+tomorrow,
# sorts by start_time, and assigns to idle_agenda_slot_0..4 with colour
# and greying for past events (end_time < now).
#
# Follows the generation-counter pattern from media_player_select.yaml.
# =============================================================================

substitutions:
  calendar_entity_1: ""
  calendar_entity_2: ""
  calendar_entity_3: ""


# -----------------------------------------------------------------------------
# Raw attribute storage — updated by subscription callbacks before label render
# -----------------------------------------------------------------------------
globals:
  - id: cal_title_0
    type: std::string
    initial_value: '""'
  - id: cal_start_0
    type: std::string
    initial_value: '""'
  - id: cal_end_0
    type: std::string
    initial_value: '""'
  - id: cal_all_day_0
    type: std::string
    initial_value: '""'

  - id: cal_title_1
    type: std::string
    initial_value: '""'
  - id: cal_start_1
    type: std::string
    initial_value: '""'
  - id: cal_end_1
    type: std::string
    initial_value: '""'
  - id: cal_all_day_1
    type: std::string
    initial_value: '""'

  - id: cal_title_2
    type: std::string
    initial_value: '""'
  - id: cal_start_2
    type: std::string
    initial_value: '""'
  - id: cal_end_2
    type: std::string
    initial_value: '""'
  - id: cal_all_day_2
    type: std::string
    initial_value: '""'

  - id: cal_sub_gen_0
    type: int
    initial_value: '0'
  - id: cal_sub_gen_1
    type: int
    initial_value: '0'
  - id: cal_sub_gen_2
    type: int
    initial_value: '0'


# -----------------------------------------------------------------------------
# Entity selector text entities (NVS-persisted, visible in device settings)
# -----------------------------------------------------------------------------
text:
  - platform: template
    name: "Calendar 1 Entity"
    id: calendar_entity_select_0
    entity_category: config
    icon: "mdi:calendar"
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "${calendar_entity_1}"
    min_length: 0
    max_length: 100
    on_value:
      - script.execute: subscribe_calendar_0

  - platform: template
    name: "Calendar 2 Entity"
    id: calendar_entity_select_1
    entity_category: config
    icon: "mdi:calendar"
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "${calendar_entity_2}"
    min_length: 0
    max_length: 100
    on_value:
      - script.execute: subscribe_calendar_1

  - platform: template
    name: "Calendar 3 Entity"
    id: calendar_entity_select_2
    entity_category: config
    icon: "mdi:calendar"
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "${calendar_entity_3}"
    min_length: 0
    max_length: 100
    on_value:
      - script.execute: subscribe_calendar_2


# -----------------------------------------------------------------------------
# Subscription scripts
# -----------------------------------------------------------------------------
script:

  # ---------------------------------------------------------------------------
  # render_idle_agenda
  # ---------------------------------------------------------------------------
  # Collects events from all 3 calendar slots, filters to today+tomorrow,
  # sorts by start_time, and populates idle_agenda_slot_0..4.
  # Past events (end_time < now) are greyed out.
  # Called by show_idle_view, update_idle_clock, and each calendar callback.
  # ---------------------------------------------------------------------------
  - id: render_idle_agenda
    mode: single
    then:
      - lambda: |-
          auto now_time = id(ha_time).now();
          if (!now_time.is_valid()) return;

          // Build ISO date strings for today and tomorrow
          char today_str[11], tomorrow_str[11];
          snprintf(today_str, sizeof(today_str), "%04d-%02d-%02d",
                   now_time.year, now_time.month, now_time.day_of_month);

          time_t ts_tomorrow = now_time.timestamp + 86400;
          struct tm tm_buf;
          localtime_r(&ts_tomorrow, &tm_buf);
          snprintf(tomorrow_str, sizeof(tomorrow_str), "%04d-%02d-%02d",
                   tm_buf.tm_year + 1900, tm_buf.tm_mon + 1, tm_buf.tm_mday);

          // Build now datetime string for past-event comparison
          char now_dt[20];
          snprintf(now_dt, sizeof(now_dt), "%04d-%02d-%02d %02d:%02d:%02d",
                   now_time.year, now_time.month, now_time.day_of_month,
                   now_time.hour, now_time.minute, now_time.second);

          // Calendar accent colors (matching calendar page slots)
          const uint32_t CAL_COLORS[3] = {0x4A90E2, 0x5BA55A, 0xE2914A};

          // Agenda item struct — uses fixed char buffers to avoid heap allocation
          struct AgendaItem {
            char start[20];       // "YYYY-MM-DD HH:MM:SS\0" for ISO sort
            char title[64];
            char time_label[48];  // "Tomorrow · 12:00 PM\0"
            uint32_t accent_color;
            bool is_past;
          };

          AgendaItem items[3];
          int item_count = 0;
          memset(items, 0, sizeof(items));

          // Populate one item from a calendar slot's globals.
          auto add_event = [&](
              const std::string &title,
              const std::string &start,
              const std::string &end_s,
              const std::string &all_day_s,
              int cal_idx) {

            if (title.empty()) return;
            if (start.length() < 10) return;

            bool is_today    = (strncmp(start.c_str(), today_str, 10) == 0);
            bool is_tomorrow = (strncmp(start.c_str(), tomorrow_str, 10) == 0);
            if (!is_today && !is_tomorrow) return;

            bool is_allday = (all_day_s == "True" || all_day_s == "true" || all_day_s == "1");

            // Determine if event has passed
            bool is_past = false;
            if (!is_allday && end_s.length() >= 19) {
              is_past = (strncmp(end_s.c_str(), now_dt, 19) < 0);
            }

            // Build human-readable time label  e.g. "Today · 9:00 AM"
            const char *day_prefix = is_today ? "Today" : "Tomorrow";
            char time_buf[48];
            if (is_allday) {
              snprintf(time_buf, sizeof(time_buf), "%s \xc2\xb7 All Day", day_prefix);
            } else if (start.length() >= 16) {
              int sh   = atoi(start.c_str() + 11);
              int smin = atoi(start.c_str() + 14);
              const char *ap = (sh >= 12) ? "PM" : "AM";
              int h12 = sh % 12;
              if (h12 == 0) h12 = 12;
              snprintf(time_buf, sizeof(time_buf), "%s \xc2\xb7 %d:%02d %s",
                       day_prefix, h12, smin, ap);
            } else {
              snprintf(time_buf, sizeof(time_buf), "%s", day_prefix);
            }

            if (item_count < 3) {
              AgendaItem &item = items[item_count++];
              strncpy(item.start,      start.c_str(),      sizeof(item.start)      - 1);
              strncpy(item.title,      title.c_str(),      sizeof(item.title)      - 1);
              strncpy(item.time_label, time_buf,           sizeof(item.time_label) - 1);
              item.accent_color = CAL_COLORS[cal_idx];
              item.is_past = is_past;
            }
          };

          add_event(id(cal_title_0), id(cal_start_0), id(cal_end_0), id(cal_all_day_0), 0);
          add_event(id(cal_title_1), id(cal_start_1), id(cal_end_1), id(cal_all_day_1), 1);
          add_event(id(cal_title_2), id(cal_start_2), id(cal_end_2), id(cal_all_day_2), 2);

          // Sort by start time (ISO string comparison is correct for YYYY-MM-DD HH:MM:SS)
          for (int i = 0; i < item_count - 1; i++) {
            for (int j = i + 1; j < item_count; j++) {
              if (strcmp(items[j].start, items[i].start) < 0) {
                AgendaItem tmp = items[i];
                items[i] = items[j];
                items[j] = tmp;
              }
            }
          }

          // Widget pointer arrays for agenda slots 0..4
          lv_obj_t *slot_objs[] = {
            id(idle_agenda_slot_0), id(idle_agenda_slot_1), id(idle_agenda_slot_2),
            id(idle_agenda_slot_3), id(idle_agenda_slot_4)
          };
          lv_obj_t *accent_objs[] = {
            id(idle_agenda_accent_0), id(idle_agenda_accent_1), id(idle_agenda_accent_2),
            id(idle_agenda_accent_3), id(idle_agenda_accent_4)
          };
          lv_obj_t *time_labels[] = {
            id(idle_agenda_time_0), id(idle_agenda_time_1), id(idle_agenda_time_2),
            id(idle_agenda_time_3), id(idle_agenda_time_4)
          };
          lv_obj_t *title_labels[] = {
            id(idle_agenda_title_0), id(idle_agenda_title_1), id(idle_agenda_title_2),
            id(idle_agenda_title_3), id(idle_agenda_title_4)
          };

          for (int i = 0; i < 5; i++) {
            if (i < item_count) {
              const AgendaItem &item = items[i];
              lv_obj_clear_flag(slot_objs[i], LV_OBJ_FLAG_HIDDEN);

              uint32_t accent_col = item.is_past ? 0x444444U : item.accent_color;
              uint32_t time_col   = item.is_past ? 0x444444U : item.accent_color;
              uint32_t title_col  = item.is_past ? 0x555555U : 0xDDDDDDU;

              lv_obj_set_style_bg_color(accent_objs[i], lv_color_hex(accent_col), 0);
              lv_obj_set_style_text_color(time_labels[i], lv_color_hex(time_col), 0);
              lv_obj_set_style_text_color(title_labels[i], lv_color_hex(title_col), 0);
              lv_label_set_text(time_labels[i], item.time_label);
              lv_label_set_text(title_labels[i], item.title);
            } else {
              lv_obj_add_flag(slot_objs[i], LV_OBJ_FLAG_HIDDEN);
            }
          }

  # ---------------------------------------------------------------------------
  # subscribe_calendar_0
  # ---------------------------------------------------------------------------
  - id: subscribe_calendar_0
    mode: restart
    then:
      - lambda: |-
          std::string entity = id(calendar_entity_select_0).state;

          // Reset slot to unconfigured state
          if (entity.empty() || entity.substr(0, 9) != "calendar.") {
            id(cal_title_0) = "";
            id(cal_start_0) = "";
            id(cal_end_0)   = "";
            id(cal_all_day_0) = "";
            lv_label_set_text(id(cal_time_label_0), "\xe2\x80\x94");
            lv_label_set_text(id(cal_title_label_0), "No calendar set");
            lv_label_set_text(id(cal_desc_label_0), "");
            id(render_idle_agenda).execute();
            if (!entity.empty()) {
              ESP_LOGW("calendar", "Slot 0: '%s' must start with 'calendar.'", entity.c_str());
            }
            return;
          }

          if (esphome::api::global_api_server == nullptr) return;

          id(cal_sub_gen_0) += 1;
          int gen = id(cal_sub_gen_0);
          int *gen_ptr = &id(cal_sub_gen_0);

          std::string *title_ptr   = &id(cal_title_0);
          std::string *start_ptr   = &id(cal_start_0);
          std::string *end_ptr     = &id(cal_end_0);
          std::string *allday_ptr  = &id(cal_all_day_0);

          auto *api = esphome::api::global_api_server;
          using str_cb = std::function<void(const std::string &)>;

          // ---- Helper: format start+all_day → "H:MM AM" or "All Day" ----
          auto fmt_time = [](const std::string &start, const std::string &all_day) -> std::string {
            if (all_day == "True" || all_day == "true" || all_day == "1") return std::string("All Day");
            if (start.length() < 16) return std::string("");
            int hour   = atoi(start.substr(11, 2).c_str());
            int minute = atoi(start.substr(14, 2).c_str());
            const char *ap = hour >= 12 ? "PM" : "AM";
            int h12 = hour % 12; if (h12 == 0) h12 = 12;
            char buf[16];
            snprintf(buf, sizeof(buf), "%d:%02d %s", h12, minute, ap);
            return std::string(buf);
          };

          // message → title
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("message"),
              str_cb([gen, gen_ptr, title_ptr](const std::string &state) {
                if (gen != *gen_ptr) return;
                *title_ptr = state;
                lv_label_set_text(id(cal_title_label_0),
                    state.empty() ? "No upcoming events" : state.c_str());
                id(render_idle_agenda).execute();
              }));

          // start_time → time label on calendar page + triggers agenda re-render
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("start_time"),
              str_cb([gen, gen_ptr, start_ptr, allday_ptr, fmt_time](const std::string &state) {
                if (gen != *gen_ptr) return;
                *start_ptr = state;
                std::string ts = fmt_time(state, *allday_ptr);
                lv_label_set_text(id(cal_time_label_0), ts.empty() ? "\xe2\x80\x94" : ts.c_str());
                id(render_idle_agenda).execute();
              }));

          // end_time → stored for past-event detection in render_idle_agenda
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("end_time"),
              str_cb([gen, gen_ptr, end_ptr](const std::string &state) {
                if (gen != *gen_ptr) return;
                *end_ptr = state;
                id(render_idle_agenda).execute();
              }));

          // all_day → update time label
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("all_day"),
              str_cb([gen, gen_ptr, allday_ptr, start_ptr, fmt_time](const std::string &state) {
                if (gen != *gen_ptr) return;
                *allday_ptr = state;
                std::string ts = fmt_time(*start_ptr, state);
                lv_label_set_text(id(cal_time_label_0), ts.empty() ? "\xe2\x80\x94" : ts.c_str());
              }));

          // location → description label (calendar page only)
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("location"),
              str_cb([gen, gen_ptr](const std::string &state) {
                if (gen != *gen_ptr) return;
                lv_label_set_text(id(cal_desc_label_0), state.c_str());
              }));

          ESP_LOGI("calendar", "Slot 0: subscribed to '%s'", entity.c_str());

  # ---------------------------------------------------------------------------
  # subscribe_calendar_1
  # ---------------------------------------------------------------------------
