# =============================================================================
# HARDWARE CONFIGURATION - Guition ESP32-P4-JC8012P4A1
# =============================================================================
# Hardware settings for the ESP32-P4 10.1" 1280x800 landscape touchscreen.
# Uses MIPI DSI display, GSL3680 touch controller, and ESP32-C6 coprocessor
# for WiFi/BT connectivity.
#
# WARNING: These settings are specific to the Guition ESP32-P4-JC8012P4A1.
#          Using this config with a different device may cause issues.
# =============================================================================


esp32:
  variant: ESP32P4
  flash_size: 16MB
  engineering_sample: true
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_HTTPD_MAX_URI_LEN: "128"
    advanced:
      enable_idf_experimental_features: true


esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.4.0
  platformio_options:
    board_build.flash_mode: dio
    build_flags:
      - "-DCONFIG_LV_DISP_DEF_REFR_PERIOD=10"
      - "-DCONFIG_COMPILER_OPTIMIZATION_PERF=y"
      - "-Wno-deprecated-declarations"


# ESP32-C6 coprocessor for WiFi and Bluetooth via SDIO
esp32_hosted:
  variant: esp32c6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true


psram:
  mode: hex
  speed: 200MHz


# Hide screen during OTA to avoid flicker
ota:
  - platform: esphome
    on_begin:
      - lvgl.pause
      - light.turn_off:
          id: backlight
          transition_length: 0s
    on_error:
      - light.turn_on:
          id: backlight
          brightness: 100%
          transition_length: 0s
      - lvgl.resume


api:
  on_client_connected:
    - lambda: |-
        if (client_info.find("Home Assistant") != std::string::npos) {
          std::string protocol = "${ha_protocol}";
          std::string host = "${ha_host}";
          std::string port = "${ha_port}";
          // Use the HA API client IP for http (avoids mDNS lookup for artwork),
          // but keep the configured hostname for https (raw IPs won't match SSL certs).
          if (protocol == "http" && host == "homeassistant.local") {
            id(ha_base_url) = "http://" + client_address + ":" + port;
          } else {
            id(ha_base_url) = protocol + "://" + host + ":" + port;
          }
        }
    - lvgl.widget.hide: ha_setup_prompt
    - script.execute: subscribe_media_player
  on_client_disconnected:
    - lvgl.widget.hide: setup_prompt
    - if:
        condition:
          lambda: |-
            return !id(device_has_been_setup)
                && !id(boot_grace_period)
                && (esphome::api::global_api_server == nullptr
                    || !esphome::api::global_api_server->is_connected());
        then:
          - lvgl.widget.show: ha_setup_prompt


logger:
  level: DEBUG
  baud_rate: 0


external_components:
  - source: github://kvj/esphome@jd9365_gsl3680
    components: [gsl3680]

# Shared header-only JSON parser for calendar + forecast HTTP responses.
# External component is declared in addon/music.yaml (git) and dev.yaml (local);
# the component's __init__.py emits the corresponding #include into main.cpp.
calendar_json:


# DSI PHY power rail
esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
    adjustable: True


output:
  - platform: ledc
    id: backlight_output
    pin: GPIO23


i2c:
  - id: i2c_bus_a
    sda: GPIO7
    scl: GPIO8
    scan: true
    frequency: 400kHz
    sda_pullup_enabled: False
    scl_pullup_enabled: False


# -----------------------------------------------------------------------------
# GLOBAL STATE VARIABLES
# -----------------------------------------------------------------------------
globals:
  # -- Touch tracking (swipe gesture detection) --
  - id: touch_x_start
    type: int
    initial_value: '0'
  - id: touch_y_start
    type: int
    initial_value: '0'
  - id: touch_x_end
    type: int
    initial_value: '0'
  - id: touch_y_end
    type: int
    initial_value: '0'
  # -- Settings panel state --
  - id: is_panel_open
    type: bool
    initial_value: 'false'
  - id: was_panel_open
    type: bool
    initial_value: 'false'

  # -- Setup flow --
  - id: actions_prompt_acked
    type: bool
    restore_value: true
    initial_value: 'false'
  # True after first successful setup (WiFi + HA + media entity); suppresses
  # WiFi/HA/actions setup prompts on restart so user sees loading/main UI instead.
  - id: device_has_been_setup
    type: bool
    restore_value: true
    initial_value: 'false'



# -----------------------------------------------------------------------------
# TOUCHSCREEN (GSL3680)
# -----------------------------------------------------------------------------
touchscreen:
  - platform: gsl3680
    id: tft_touch
    display: tft_display
    reset_pin: GPIO22
    interrupt_pin: GPIO21
    # mipi_dsi has no hardware rotation, so LVGL rotates in software. LVGL's
    # rotate_coordinates expects touch in panel-native portrait (800x1280) and
    # maps it to landscape. With swap_xy=true plus LVGL's built-in rotation we
    # would swap twice; so swap is false and mirror_x compensates for the 90°
    # map. Same transform works for both display_rotation: 90 and 270 because
    # LVGL rotation handles the visual flip; the physical touch panel rotates
    # with the display.
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: false
    on_touch:
      - lambda: |-
          id(was_panel_open) = id(is_panel_open);
          id(touch_x_start) = touch.x;
          id(touch_y_start) = touch.y;
          id(touch_x_end) = touch.x;
          id(touch_y_end) = touch.y;
      - script.execute: backlight_wake_timeout
      - script.execute: start_view_return_timeout
      - lambda: |-
          if (id(is_panel_open)) id(start_speaker_panel_timeout).execute();
    on_update:
      - lambda: |-
          for (auto touch: touches) {
            if (touch.state <= 2) {
              id(touch_x_end) = touch.x;
              id(touch_y_end) = touch.y;
            }
          }
    on_release:
      - lambda: |-
          int dx = id(touch_x_end) - id(touch_x_start);
          int dy = id(touch_y_end) - id(touch_y_start);
          int sy = id(touch_y_start);
          ESP_LOGD("touch", "Swipe dx=%d dy=%d start=(%d,%d) end=(%d,%d)",
                   dx, dy, id(touch_x_start), id(touch_y_start),
                   id(touch_x_end), id(touch_y_end));

          // --- Dismiss actions prompt on tap ---
          if (!lv_obj_has_flag(id(actions_prompt), LV_OBJ_FLAG_HIDDEN)) {
            if (abs(dx) < 20 && abs(dy) < 20) {
              lv_obj_add_flag(id(actions_prompt), LV_OBJ_FLAG_HIDDEN);
              id(actions_prompt_acked) = true;
              id(device_has_been_setup) = true;
              global_preferences->sync();
              App.safe_reboot();
            }
            return;
          }

          // Navbar view switching is dispatched by LVGL on_press on each nav
          // button (see device/navbar.yaml). The ESPHome touchscreen callback
          // receives panel-native portrait coordinates (800x1280) after the
          // swap_xy=false transform, so it cannot cleanly identify landscape
          // navbar taps here without a coordinate conversion. A previous
          // attempt to dispatch navbar taps from this callback using
          // landscape-space checks (touch_y_start >= 740) matched the wrong
          // region and caused Forecast taps to flash to idle.

          // --- Vertical swipe: settings panel open (only from top 200px, music page only) ---
          if (dy > 30 && sy < 200 && abs(dy) > abs(dx) * 2 && !id(is_panel_open) && id(current_view) == 1) {
            id(open_settings_panel).execute();
            return;
          }
          if (id(is_panel_open) || id(was_panel_open)) {
            return;
          }

          // --- Horizontal swipe: track navigation (music page only) ---
          if (abs(dx) > 80 && abs(dx) > abs(dy) * 2 && id(current_view) == 1) {
            std::string e = id(media_player_entity).state;
            bool can_skip = !e.empty() && id(media_player_state_sensor).has_state();
            if (can_skip) {
              std::string s = id(media_player_state_sensor).state;
              can_skip = (s == "playing" || s == "paused");
            }
            if (can_skip) {
              if (dx > 0) {
                id(swipe_previous_track).execute();
              } else {
                id(swipe_next_track).execute();
              }
            }
          }


# -----------------------------------------------------------------------------
# INTERACTION SCRIPTS
# -----------------------------------------------------------------------------
# Track navigation: next/previous (allowed when playing or paused).
script:
  - id: swipe_next_track
    mode: single
    then:
      - homeassistant.service:
          service: media_player.media_next_track
          variables:
            target: !lambda 'return id(media_player_entity).state;'
          data_template:
            entity_id: "{{ target }}"
          on_error:
            - lambda: |-
                if (!id(actions_prompt_acked)) {
                  lv_obj_clear_flag(id(actions_prompt), LV_OBJ_FLAG_HIDDEN);
                }
      - logger.log: "Media: next_track"
  - id: swipe_previous_track
    mode: single
    then:
      - homeassistant.service:
          service: media_player.media_previous_track
          variables:
            target: !lambda 'return id(media_player_entity).state;'
          data_template:
            entity_id: "{{ target }}"
          on_error:
            - lambda: |-
                if (!id(actions_prompt_acked)) {
                  lv_obj_clear_flag(id(actions_prompt), LV_OBJ_FLAG_HIDDEN);
                }
      - logger.log: "Media: previous_track"

  - id: open_settings_panel
    mode: single
    then:
      - lambda: 'id(is_panel_open) = true;'
      - if:
          condition:
            lambda: 'return id(speaker_count) <= 1;'
          then:
            - script.execute: show_fallback_speaker
      - lvgl.widget.show: settings_panel
      - script.execute: start_speaker_panel_timeout
  - id: close_settings_panel
    mode: single
    then:
      - script.stop: start_speaker_panel_timeout
      - lvgl.widget.hide: settings_panel
      - lambda: 'id(is_panel_open) = false;'
  - id: start_speaker_panel_timeout
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(speaker_panel_timeout).state > 0;'
          then:
            - delay: !lambda 'return (uint32_t)(id(speaker_panel_timeout).state * 1000);'
            - if:
                condition:
                  lambda: 'return id(is_panel_open);'
                then:
                  - script.execute: close_settings_panel

  - id: show_track_view
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(is_panel_open);'
          then:
            - lvgl.widget.hide: settings_panel
            - lambda: 'id(is_panel_open) = false;'




# -----------------------------------------------------------------------------
# DISPLAY (MIPI DSI - JC8012P4A1)
# -----------------------------------------------------------------------------
display:
  - platform: mipi_dsi
    model: JC8012P4A1
    id: tft_display
    reset_pin: GPIO27
    auto_clear_enabled: false
    color_order: RGB
    dimensions:
      width: 800
      height: 1280
