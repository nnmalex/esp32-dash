  - platform: template
    id: idle_sensor_state_9
    on_value:
      - lvgl.label.update:
          id: idle_sensor_value_9
          text: !lambda 'return x.empty() ? std::string("\xe2\x80\x94") : x;'


# -----------------------------------------------------------------------------
# Subscription scripts
# -----------------------------------------------------------------------------
script:

  # ---------------------------------------------------------------------------
  # load_weather_bg: sets the weather background image URL and triggers download.
  # Called from idle_weather_condition_sensor.on_value when bg_path is configured.
  # ---------------------------------------------------------------------------
  - id: load_weather_bg
    mode: restart
    then:
      - online_image.set_url:
          id: idle_weather_bg_image
          url: !lambda 'return id(weather_bg_url_str);'

  # ---------------------------------------------------------------------------
  # subscribe_weather: subscribes to state + temperature attribute of a weather.* entity.
  # Resets labels to "—" when entity is empty or invalid.
  # ---------------------------------------------------------------------------
  - id: subscribe_weather
    mode: restart
    then:
      - lambda: |-
          std::string entity = id(weather_entity_select).state;

          if (entity.empty() || entity.substr(0, 8) != "weather.") {
            lv_label_set_text(id(idle_weather_condition_label), "\xe2\x80\x94");
            if (!id(use_local_temp))
              lv_label_set_text(id(idle_weather_temp_label), "\xe2\x80\x94");
            if (!entity.empty()) {
              ESP_LOGW("weather", "Invalid entity '%s' — must start with 'weather.'", entity.c_str());
            }
            return;
          }

          if (esphome::api::global_api_server == nullptr) return;

          id(weather_sub_gen) += 1;
          int gen = id(weather_sub_gen);
          int *gen_ptr = &id(weather_sub_gen);

          auto *api = esphome::api::global_api_server;
          using str_cb = std::function<void(const std::string &)>;

          // State = condition string (e.g. "partlycloudy")
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>(""),
              str_cb([gen, gen_ptr](const std::string &state) {
                if (gen != *gen_ptr) return;
                id(idle_weather_condition_sensor).publish_state(state);
              }));

          // temperature attribute
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("temperature"),
              str_cb([gen, gen_ptr](const std::string &state) {
                if (gen != *gen_ptr) return;
                id(idle_weather_temp_sensor).publish_state(state);
              }));

          ESP_LOGI("weather", "Subscribed to '%s'", entity.c_str());

  # ---------------------------------------------------------------------------
  # subscribe_local_temp: subscribes to an optional HA sensor entity whose
  # state (numeric) overrides the weather entity's temperature on the idle page.
  # When the entity is cleared, use_local_temp is reset to false.
  # ---------------------------------------------------------------------------
  - id: subscribe_local_temp
    mode: restart
    then:
      - lambda: |-
          std::string entity = id(local_temp_entity_select).state;

          if (entity.empty()) {
            id(use_local_temp) = false;
            // Re-publish last weather temp (triggers on_value → label update)
            if (id(idle_weather_temp_sensor).has_state()) {
              id(idle_weather_temp_sensor).publish_state(id(idle_weather_temp_sensor).state);
            }
            return;
          }

          if (esphome::api::global_api_server == nullptr) return;

          id(local_temp_sub_gen) += 1;
          int gen = id(local_temp_sub_gen);
          int *gen_ptr = &id(local_temp_sub_gen);

          auto *api = esphome::api::global_api_server;
          using str_cb = std::function<void(const std::string &)>;

          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>(""),
              str_cb([gen, gen_ptr](const std::string &state) {
                if (gen != *gen_ptr) return;
                auto v = esphome::parse_number<float>(state);
                if (!v.has_value()) return;
                id(use_local_temp) = true;
                int rounded = (int)(v.value() + 0.5f);
                char buf[16];
                snprintf(buf, sizeof(buf), "%d\xc2\xb0", rounded);
                lv_label_set_text(id(idle_weather_temp_label), buf);
                id(current_temp_int) = rounded;
                // Re-evaluate feels-like visibility now that main temp may have changed.
                if (id(idle_weather_feels_sensor).has_state())
                  id(idle_weather_feels_sensor).publish_state(id(idle_weather_feels_sensor).state);
              }));

          ESP_LOGI("weather", "Local temp sensor: subscribed to '%s'", entity.c_str());

  # ---------------------------------------------------------------------------
  # subscribe_feels_like: subscribes to an optional HA sensor entity for
  # apparent/feels-like temperature. Shows "(feels N°)" below the main temp.
  # Hides the label when entity is cleared.
  # ---------------------------------------------------------------------------
  - id: subscribe_feels_like
    mode: restart
    then:
      - lambda: |-
          std::string entity = id(feels_like_entity_select).state;

          if (entity.empty()) {
            lv_obj_add_flag(id(idle_weather_feels_label), LV_OBJ_FLAG_HIDDEN);
            lv_label_set_text(id(idle_weather_feels_label), "");
            return;
          }

          if (esphome::api::global_api_server == nullptr) return;

          id(feels_like_sub_gen) += 1;
          int gen = id(feels_like_sub_gen);
          int *gen_ptr = &id(feels_like_sub_gen);

          auto *api = esphome::api::global_api_server;
          using str_cb = std::function<void(const std::string &)>;

          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>(""),
              str_cb([gen, gen_ptr](const std::string &state) {
                if (gen != *gen_ptr) return;
                id(idle_weather_feels_sensor).publish_state(state);
              }));

          ESP_LOGI("weather", "Feels-like sensor: subscribed to '%s'", entity.c_str());

  # ---------------------------------------------------------------------------
  # subscribe_idle_sensor: subscribes to state + attributes of sensor tile N.
  # Shows the tile container when an entity is configured; hides it when empty.
  # Slots 0-4 are left-column (dynamic unit positioning); 5-9 are right-column.
  # ---------------------------------------------------------------------------
  - id: subscribe_idle_sensor
    parameters:
      slot: int
    mode: restart
    then:
      - lambda: |-
          // Resolve per-slot LVGL widget pointers
          lv_obj_t *t_tiles[]  = { id(idle_sensor_tile_0),  id(idle_sensor_tile_1),  id(idle_sensor_tile_2),
                                    id(idle_sensor_tile_3),  id(idle_sensor_tile_4),  id(idle_sensor_tile_5),
                                    id(idle_sensor_tile_6),  id(idle_sensor_tile_7),  id(idle_sensor_tile_8),
                                    id(idle_sensor_tile_9) };
          lv_obj_t *t_names[]  = { id(idle_sensor_name_0),  id(idle_sensor_name_1),  id(idle_sensor_name_2),
                                    id(idle_sensor_name_3),  id(idle_sensor_name_4),  id(idle_sensor_name_5),
                                    id(idle_sensor_name_6),  id(idle_sensor_name_7),  id(idle_sensor_name_8),
                                    id(idle_sensor_name_9) };
          lv_obj_t *t_values[] = { id(idle_sensor_value_0), id(idle_sensor_value_1), id(idle_sensor_value_2),
                                    id(idle_sensor_value_3), id(idle_sensor_value_4), id(idle_sensor_value_5),
                                    id(idle_sensor_value_6), id(idle_sensor_value_7), id(idle_sensor_value_8),
                                    id(idle_sensor_value_9) };
          lv_obj_t *t_icons[]  = { id(idle_sensor_icon_0),  id(idle_sensor_icon_1),  id(idle_sensor_icon_2),
                                    id(idle_sensor_icon_3),  id(idle_sensor_icon_4),  id(idle_sensor_icon_5),
                                    id(idle_sensor_icon_6),  id(idle_sensor_icon_7),  id(idle_sensor_icon_8),
                                    id(idle_sensor_icon_9) };
          lv_obj_t *t_units[]  = { id(idle_sensor_unit_0),  id(idle_sensor_unit_1),  id(idle_sensor_unit_2),
                                    id(idle_sensor_unit_3),  id(idle_sensor_unit_4),  id(idle_sensor_unit_5),
                                    id(idle_sensor_unit_6),  id(idle_sensor_unit_7),  id(idle_sensor_unit_8),
                                    id(idle_sensor_unit_9) };

          lv_obj_t *tile      = t_tiles[slot];
          lv_obj_t *name_lbl  = t_names[slot];
          lv_obj_t *value_lbl = t_values[slot];
          lv_obj_t *icon_lbl  = t_icons[slot];
          lv_obj_t *unit_lbl  = t_units[slot];

          // Get entity ID for this slot
          std::string entity;
          switch (slot) {
            case 0: entity = id(idle_sensor_entity_0).state; break;
            case 1: entity = id(idle_sensor_entity_1).state; break;
            case 2: entity = id(idle_sensor_entity_2).state; break;
            case 3: entity = id(idle_sensor_entity_3).state; break;
            case 4: entity = id(idle_sensor_entity_4).state; break;
            case 5: entity = id(idle_sensor_entity_5).state; break;
            case 6: entity = id(idle_sensor_entity_6).state; break;
            case 7: entity = id(idle_sensor_entity_7).state; break;
            case 8: entity = id(idle_sensor_entity_8).state; break;
            case 9: entity = id(idle_sensor_entity_9).state; break;
            default: return;
          }

          if (entity.empty()) {
            lv_obj_add_flag(tile, LV_OBJ_FLAG_HIDDEN);
            lv_label_set_text(name_lbl,  "");
            lv_label_set_text(value_lbl, "\xe2\x80\x94");
            lv_label_set_text(icon_lbl,  "");
            lv_label_set_text(unit_lbl,  "");
            id(idle_sensor_raw)[slot] = "";
            return;
          }

          // Derive display name from entity_id until friendly_name arrives
          std::string name = entity;
          size_t dot = name.rfind('.');
          if (dot != std::string::npos) name = name.substr(dot + 1);
          bool cap = true;
          for (char &c : name) {
            if (c == '_') { c = ' '; cap = true; }
            else if (cap && isalpha((unsigned char)c)) { c = toupper(c); cap = false; }
            else { cap = false; }
          }
          lv_label_set_text(name_lbl, name.c_str());
          lv_label_set_text(icon_lbl, "\U000F0208");  // eye fallback
          lv_label_set_text(unit_lbl, "");
          lv_obj_clear_flag(tile, LV_OBJ_FLAG_HIDDEN);

          if (esphome::api::global_api_server == nullptr) return;

          id(idle_sensor_gen)[slot] += 1;
          int gen = id(idle_sensor_gen)[slot];
          int *gen_ptr = &id(idle_sensor_gen)[slot];

          auto *api = esphome::api::global_api_server;
          using str_cb = std::function<void(const std::string &)>;

          // State subscription — format with per-slot precision, publish to text sensor
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>(""),
              str_cb([gen, gen_ptr, slot](const std::string &state) {
                if (gen != *gen_ptr) return;
                id(idle_sensor_raw)[slot] = state;
                std::string out = state;
                int prec;
                switch (slot) {
                  case 0: prec = (int)id(idle_sensor_prec_0).state; break;
                  case 1: prec = (int)id(idle_sensor_prec_1).state; break;
                  case 2: prec = (int)id(idle_sensor_prec_2).state; break;
                  case 3: prec = (int)id(idle_sensor_prec_3).state; break;
                  case 4: prec = (int)id(idle_sensor_prec_4).state; break;
                  case 5: prec = (int)id(idle_sensor_prec_5).state; break;
                  case 6: prec = (int)id(idle_sensor_prec_6).state; break;
                  case 7: prec = (int)id(idle_sensor_prec_7).state; break;
                  case 8: prec = (int)id(idle_sensor_prec_8).state; break;
                  default: prec = (int)id(idle_sensor_prec_9).state; break;
                }
                if (prec >= 0 && !state.empty()) {
                  char *end; float val = strtof(state.c_str(), &end);
                  if (end != state.c_str()) {
                    char buf[32]; snprintf(buf, sizeof(buf), "%.*f", prec, val);
                    out = buf;
                  }
                }
                switch (slot) {
                  case 0: id(idle_sensor_state_0).publish_state(out); break;
                  case 1: id(idle_sensor_state_1).publish_state(out); break;
                  case 2: id(idle_sensor_state_2).publish_state(out); break;
                  case 3: id(idle_sensor_state_3).publish_state(out); break;
                  case 4: id(idle_sensor_state_4).publish_state(out); break;
                  case 5: id(idle_sensor_state_5).publish_state(out); break;
                  case 6: id(idle_sensor_state_6).publish_state(out); break;
                  case 7: id(idle_sensor_state_7).publish_state(out); break;
                  case 8: id(idle_sensor_state_8).publish_state(out); break;
                  default: id(idle_sensor_state_9).publish_state(out); break;
                }
              }));

          // Friendly name subscription — update name label when HA provides it
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("friendly_name"),
              str_cb([gen, gen_ptr, name_lbl](const std::string &state) {
                if (gen != *gen_ptr) return;
                if (!state.empty()) lv_label_set_text(name_lbl, state.c_str());
              }));

          // Unit subscription — left-column tiles (0-4) reposition unit after value label
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("unit_of_measurement"),
              str_cb([gen, gen_ptr, slot, unit_lbl, value_lbl](const std::string &unit) {
                if (gen != *gen_ptr) return;
                lv_label_set_text(unit_lbl, unit.c_str());
                if (slot < 5) {
                  lv_point_t _sz;
                  lv_txt_get_size(&_sz, lv_label_get_text(value_lbl),
                    lv_obj_get_style_text_font(value_lbl, LV_PART_MAIN),
                    lv_obj_get_style_text_letter_space(value_lbl, LV_PART_MAIN),
                    0, LV_COORD_MAX, 0);
                  lv_obj_set_x(unit_lbl, 70 + _sz.x + 6);
                }
              }));

          // Icon subscription — maps mdi:* attribute to compiled glyph codepoint
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("icon"),
              str_cb([gen, gen_ptr, icon_lbl](const std::string &icon_attr) {
                if (gen != *gen_ptr) return;
                const char *ic;
                if (icon_attr == "mdi:thermometer" ||
                    icon_attr == "mdi:thermometer-low" ||
                    icon_attr == "mdi:thermometer-high") {
                  ic = "\U000F050F";
                } else if (icon_attr == "mdi:home-thermometer" ||
                           icon_attr == "mdi:home-thermometer-outline") {
                  ic = "\U000F0F54";
                } else if (icon_attr == "mdi:water-percent") {
                  ic = "\U000F058E";
                } else if (icon_attr == "mdi:gauge") {
                  ic = "\U000F028A";
                } else if (icon_attr == "mdi:water") {
                  ic = "\U000F058C";
                } else if (icon_attr == "mdi:weather-windy") {
                  ic = "\U000F059E";
                } else if (icon_attr == "mdi:lightning-bolt" ||
                           icon_attr == "mdi:flash") {
                  ic = "\U000F140B";
                } else if (icon_attr == "mdi:molecule-co2") {
                  ic = "\U000F07E4";
                } else if (icon_attr == "mdi:brightness-5" ||
                           icon_attr == "mdi:white-balance-sunny") {
                  ic = "\U000F05A8";
                } else if (icon_attr == "mdi:motion-sensor") {
                  ic = "\U000F0D91";
                } else if (icon_attr == "mdi:power") {
                  ic = "\U000F0425";
                } else if (icon_attr == "mdi:clock-outline") {
                  ic = "\U000F0150";
                } else if (icon_attr == "mdi:sine-wave" ||
                           icon_attr == "mdi:current-ac") {
                  ic = "\U000F095B";
                } else if (icon_attr == "mdi:run") {
                  ic = "\U000F070E";
                } else if (icon_attr == "mdi:walk") {
                  ic = "\U000F0583";
                } else if (icon_attr == "mdi:battery" ||
                           icon_attr == "mdi:battery-charging" ||
                           icon_attr == "mdi:battery-unknown") {
                  ic = "\U000F0079";
                } else if (icon_attr == "mdi:battery-high") {
                  ic = "\U000F12A3";
                } else if (icon_attr == "mdi:battery-medium") {
                  ic = "\U000F12A2";
                } else if (icon_attr == "mdi:battery-low") {
                  ic = "\U000F12A1";
                } else if (icon_attr == "mdi:solar-power") {
                  ic = "\U000F0A72";
                } else if (icon_attr == "mdi:solar-power-variant") {
                  ic = "\U000F1A73";
                } else if (icon_attr == "mdi:car-electric") {
                  ic = "\U000F0B6C";
                } else if (icon_attr == "mdi:home-battery") {
                  ic = "\U000F1901";
                } else if (icon_attr == "mdi:home") {
                  ic = "\U000F02DC";
                } else if (icon_attr == "mdi:delete-restore") {
                  ic = "\U000F0819";
                } else if (icon_attr == "mdi:trash-can") {
                  ic = "\U000F0A79";
                } else {
                  ic = "\U000F0208";  // mdi:eye fallback
                }
                lv_label_set_text(icon_lbl, ic);
              }));

          ESP_LOGI("idle_sensors", "Tile %d: subscribed to '%s'", slot, entity.c_str());


# Re-subscribe after HA reconnect (merged with api block in device.yaml)
api:
  on_client_connected:
    - script.execute: subscribe_weather
    - script.execute: subscribe_local_temp
    - script.execute: subscribe_feels_like
    - script.execute: {id: subscribe_idle_sensor, slot: 0}
    - script.execute: {id: subscribe_idle_sensor, slot: 1}
    - script.execute: {id: subscribe_idle_sensor, slot: 2}
    - script.execute: {id: subscribe_idle_sensor, slot: 3}
    - script.execute: {id: subscribe_idle_sensor, slot: 4}
    - script.execute: {id: subscribe_idle_sensor, slot: 5}
    - script.execute: {id: subscribe_idle_sensor, slot: 6}
    - script.execute: {id: subscribe_idle_sensor, slot: 7}
    - script.execute: {id: subscribe_idle_sensor, slot: 8}
    - script.execute: {id: subscribe_idle_sensor, slot: 9}
