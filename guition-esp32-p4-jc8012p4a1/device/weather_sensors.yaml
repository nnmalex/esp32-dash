  # ---------------------------------------------------------------------------
  # schedule_precision_fetch: waits 5s after HA connect (to clear boot-time
  # HTTP activity), then fetches entity registry precision for all 4 tiles.
  # Only runs when ha_token is configured.
  # ---------------------------------------------------------------------------
  - id: schedule_precision_fetch
    mode: restart
    then:
      - delay: 5s
      - if:
          condition:
            lambda: 'return std::string("${ha_token}").length() > 0;'
          then:
            - script.execute: fetch_sensor_precision_0
            - script.execute: fetch_sensor_precision_1
            - script.execute: fetch_sensor_precision_2
            - script.execute: fetch_sensor_precision_3

# Re-subscribe after HA reconnect (merged with api block in device.yaml)
api:
  on_client_connected:
    - script.execute: subscribe_weather
    - script.execute: subscribe_local_temp
    - script.execute: subscribe_idle_sensor_0
    - script.execute: subscribe_idle_sensor_1
    - script.execute: subscribe_idle_sensor_2
    - script.execute: subscribe_idle_sensor_3
    - script.execute: schedule_precision_fetch
