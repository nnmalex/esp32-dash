# -----------------------------------------------------------------------------
# Precision controls — shown in HA device UI under Configuration.
# -1 = show raw state string, 0+ = round to N decimal places.
# Stored in NVS so the setting survives reboots.
# -----------------------------------------------------------------------------
number:
  - platform: template
    name: "Sensor Tile 1: Precision"
    id: idle_sensor_prec_0
    entity_category: config
    icon: "mdi:decimal"
    min_value: -1
    max_value: 5
    step: 1
    optimistic: true
    restore_value: true
    initial_value: -1
    set_action:
      - lambda: |-
          const std::string &raw = id(idle_sensor_raw)[0];
          if (raw.empty() || (int)x < 0) return;
          char *ep; float val = strtof(raw.c_str(), &ep);
          if (ep == raw.c_str()) return;
          char buf[32]; snprintf(buf, sizeof(buf), "%.*f", (int)x, val);
          id(idle_sensor_state_0).publish_state(std::string(buf));

