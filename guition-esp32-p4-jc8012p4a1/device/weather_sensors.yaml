# =============================================================================
# WEATHER & SENSOR TILES — Idle view data sources
# =============================================================================
# Provides runtime-configurable HA entity subscriptions for the idle page:
#
#   weather_entity_select    — weather.* entity; drives condition, temperature.
#   local_temp_entity_select — optional sensor.* entity whose state overrides
#                              the weather entity's temperature reading.
#   idle_sensor_entity_0..3  — four arbitrary HA entities; drive sensor tiles
#                              in the left pane. Tiles are hidden when the
#                              entity slot is empty.
#
# Weather background images:
#   Set weather_bg_path to the HA /local/ path where condition images are
#   stored, e.g. "/local/weather-backgrounds". Images must be named after
#   the HA weather condition string, e.g. "sunny.jpg", "partlycloudy.jpg".
#   Leave weather_bg_path empty (default) to disable background images.
#
# All entity IDs are NVS-persisted so the device remembers them across reboots.
# Follows the generation-counter subscription pattern from media_player_select.yaml.
# =============================================================================

substitutions:
  weather_entity: ""
  local_temp_entity: ""
  idle_sensor_1: ""
  idle_sensor_2: ""
  idle_sensor_3: ""
  idle_sensor_4: ""
  # Base path on the HA server for weather background images.
  # Example: "/local/weather-backgrounds"
  # Images named: sunny.jpg, partlycloudy.jpg, cloudy.jpg, rainy.jpg, etc.
  # Leave empty to disable weather background images.
  weather_bg_path: ""


# -----------------------------------------------------------------------------
# Weather background image (online_image component)
# Loaded at runtime when condition updates and weather_bg_path is set.
# -----------------------------------------------------------------------------
online_image:
  - url: "https://placehold.co/800x740/111111/000000"
    id: idle_weather_bg_image
    format: AUTO
    type: RGB565
    byte_order: little_endian
    resize: 800x740
    buffer_size: 65536
    on_download_finished:
      - lvgl.image.update:
          id: idle_weather_bg_widget
          src: idle_weather_bg_image
    on_error:
      - logger.log:
          level: WARN
          tag: weather_bg
          format: "Weather background image download failed"


# -----------------------------------------------------------------------------
# Generation counters — increment to invalidate stale subscription callbacks
# -----------------------------------------------------------------------------
globals:
  - id: weather_sub_gen
    type: int
    initial_value: '0'

  - id: idle_sensor_gen_0
    type: int
    initial_value: '0'
  - id: idle_sensor_gen_1
    type: int
    initial_value: '0'
  - id: idle_sensor_gen_2
    type: int
    initial_value: '0'
  - id: idle_sensor_gen_3
    type: int
    initial_value: '0'

  # suggested_display_precision per tile; -1 = unset (show raw state string)
  - id: idle_sensor_precision_0
    type: int
    initial_value: '-1'
  - id: idle_sensor_precision_1
    type: int
    initial_value: '-1'
  - id: idle_sensor_precision_2
    type: int
    initial_value: '-1'
  - id: idle_sensor_precision_3
    type: int
    initial_value: '-1'

  # Last raw state string per tile; needed to reformat when precision arrives late
  - id: idle_sensor_raw_0
    type: std::string
    initial_value: '""'
  - id: idle_sensor_raw_1
    type: std::string
    initial_value: '""'
  - id: idle_sensor_raw_2
    type: std::string
    initial_value: '""'
  - id: idle_sensor_raw_3
    type: std::string
    initial_value: '""'

  - id: local_temp_sub_gen
    type: int
    initial_value: '0'

  # True when a local temperature sensor is active and overrides weather temp
  - id: use_local_temp
    type: bool
    initial_value: 'false'

  # Runtime storage for the weather background URL (built from ha_base_url +
  # weather_bg_path + "/" + condition + ".jpg" when condition updates)
  - id: weather_bg_url_str
    type: std::string
    initial_value: '""'

  # Compile-time path substitution stored as a runtime global so it can be
  # used in C++ lambdas (substitutions are not available inside lambdas)
  - id: weather_bg_path_global
    type: std::string
    initial_value: '"${weather_bg_path}"'


# -----------------------------------------------------------------------------
# Entity selector text entities (NVS-persisted, visible in device settings)
# -----------------------------------------------------------------------------
text:
  - platform: template
    name: "Weather Entity"
    id: weather_entity_select
    entity_category: config
    icon: "mdi:weather-partly-cloudy"
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "${weather_entity}"
    min_length: 0
    max_length: 100
    on_value:
      - script.execute: subscribe_weather

  - platform: template
    name: "Local Temperature Sensor"
    id: local_temp_entity_select
    entity_category: config
    icon: "mdi:thermometer"
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "${local_temp_entity}"
    min_length: 0
    max_length: 100
    on_value:
      - script.execute: subscribe_local_temp

  - platform: template
    name: "Sensor Tile: Slot 1"
    id: idle_sensor_entity_0
    entity_category: config
    icon: "mdi:eye"
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "${idle_sensor_1}"
    min_length: 0
    max_length: 100
    on_value:
      - script.execute: subscribe_idle_sensor_0

  - platform: template
    name: "Sensor Tile: Slot 2"
    id: idle_sensor_entity_1
    entity_category: config
    icon: "mdi:eye"
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "${idle_sensor_2}"
    min_length: 0
    max_length: 100
    on_value:
      - script.execute: subscribe_idle_sensor_1

  - platform: template
    name: "Sensor Tile: Slot 3"
    id: idle_sensor_entity_2
    entity_category: config
    icon: "mdi:eye"
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "${idle_sensor_3}"
    min_length: 0
    max_length: 100
    on_value:
      - script.execute: subscribe_idle_sensor_2

  - platform: template
    name: "Sensor Tile: Slot 4"
    id: idle_sensor_entity_3
    entity_category: config
    icon: "mdi:eye"
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "${idle_sensor_4}"
    min_length: 0
    max_length: 100
    on_value:
      - script.execute: subscribe_idle_sensor_3


# -----------------------------------------------------------------------------
# Template text sensors — receive HA state/attributes via subscriptions
# -----------------------------------------------------------------------------
text_sensor:

  # Weather condition  e.g. "partlycloudy" → display "Partly Cloudy",
  # also triggers weather background image download if weather_bg_path is set.
  - platform: template
    id: idle_weather_condition_sensor
    on_value:
      - lvgl.label.update:
          id: idle_weather_condition_label
          text: !lambda |-
            std::string s = x;
            bool cap = true;
            for (char &c : s) {
              if (c == '-' || c == '_') { c = ' '; cap = true; }
              else if (cap && isalpha((unsigned char)c)) { c = toupper(c); cap = false; }
              else { cap = false; }
            }
            return s;
      - lambda: |-
          // Load weather background image if path is configured
          std::string path = id(weather_bg_path_global);
          if (!path.empty() && !x.empty()) {
            id(weather_bg_url_str) = id(ha_base_url) + path + "/" + x + ".jpg";
            id(load_weather_bg).execute();
          }

  # Weather temperature  e.g. "21.7" → "22°"
  # Only updates the label when no local temperature sensor is active.
  - platform: template
    id: idle_weather_temp_sensor
    on_value:
      - lambda: |-
          if (id(use_local_temp)) return;
          auto v = esphome::parse_number<float>(x);
          if (!v.has_value()) {
            lv_label_set_text(id(idle_weather_temp_label), "\xe2\x80\x94");
            return;
          }
          char buf[16];
          snprintf(buf, sizeof(buf), "%d\xc2\xb0", (int)(v.value() + 0.5f));
          lv_label_set_text(id(idle_weather_temp_label), buf);

  # Sensor tile states
  - platform: template
    id: idle_sensor_state_0
    on_value:
      - lvgl.label.update:
          id: idle_sensor_value_0
          text: !lambda 'return x.empty() ? std::string("\xe2\x80\x94") : x;'
      - lambda: |-
          lv_point_t _sz;
          lv_txt_get_size(&_sz, lv_label_get_text(id(idle_sensor_value_0)),
            lv_obj_get_style_text_font(id(idle_sensor_value_0), LV_PART_MAIN),
            lv_obj_get_style_text_letter_space(id(idle_sensor_value_0), LV_PART_MAIN),
            0, LV_COORD_MAX, 0);
          lv_obj_set_x(id(idle_sensor_unit_0), 70 + _sz.x + 6);

  - platform: template
    id: idle_sensor_state_1
    on_value:
      - lvgl.label.update:
          id: idle_sensor_value_1
          text: !lambda 'return x.empty() ? std::string("\xe2\x80\x94") : x;'
      - lambda: |-
          lv_point_t _sz;
          lv_txt_get_size(&_sz, lv_label_get_text(id(idle_sensor_value_1)),
            lv_obj_get_style_text_font(id(idle_sensor_value_1), LV_PART_MAIN),
            lv_obj_get_style_text_letter_space(id(idle_sensor_value_1), LV_PART_MAIN),
            0, LV_COORD_MAX, 0);
          lv_obj_set_x(id(idle_sensor_unit_1), 70 + _sz.x + 6);

  - platform: template
    id: idle_sensor_state_2
    on_value:
      - lvgl.label.update:
          id: idle_sensor_value_2
          text: !lambda 'return x.empty() ? std::string("\xe2\x80\x94") : x;'
      - lambda: |-
          lv_point_t _sz;
          lv_txt_get_size(&_sz, lv_label_get_text(id(idle_sensor_value_2)),
            lv_obj_get_style_text_font(id(idle_sensor_value_2), LV_PART_MAIN),
            lv_obj_get_style_text_letter_space(id(idle_sensor_value_2), LV_PART_MAIN),
            0, LV_COORD_MAX, 0);
          lv_obj_set_x(id(idle_sensor_unit_2), 70 + _sz.x + 6);

  - platform: template
    id: idle_sensor_state_3
    on_value:
      - lvgl.label.update:
          id: idle_sensor_value_3
          text: !lambda 'return x.empty() ? std::string("\xe2\x80\x94") : x;'
      - lambda: |-
          lv_point_t _sz;
          lv_txt_get_size(&_sz, lv_label_get_text(id(idle_sensor_value_3)),
            lv_obj_get_style_text_font(id(idle_sensor_value_3), LV_PART_MAIN),
            lv_obj_get_style_text_letter_space(id(idle_sensor_value_3), LV_PART_MAIN),
            0, LV_COORD_MAX, 0);
          lv_obj_set_x(id(idle_sensor_unit_3), 70 + _sz.x + 6);


# -----------------------------------------------------------------------------
# Subscription scripts
# -----------------------------------------------------------------------------
script:

  # ---------------------------------------------------------------------------
  # load_weather_bg: sets the weather background image URL and triggers download.
  # Called from idle_weather_condition_sensor.on_value when bg_path is configured.
  # ---------------------------------------------------------------------------
  - id: load_weather_bg
    mode: restart
    then:
      - online_image.set_url:
          id: idle_weather_bg_image
          url: !lambda 'return id(weather_bg_url_str);'

  # ---------------------------------------------------------------------------
  # subscribe_weather: subscribes to state + temperature attribute of a weather.* entity.
  # Resets labels to "—" when entity is empty or invalid.
  # ---------------------------------------------------------------------------
  - id: subscribe_weather
    mode: restart
    then:
      - lambda: |-
          std::string entity = id(weather_entity_select).state;

          if (entity.empty() || entity.substr(0, 8) != "weather.") {
            lv_label_set_text(id(idle_weather_condition_label), "\xe2\x80\x94");
            if (!id(use_local_temp))
              lv_label_set_text(id(idle_weather_temp_label), "\xe2\x80\x94");
            if (!entity.empty()) {
              ESP_LOGW("weather", "Invalid entity '%s' — must start with 'weather.'", entity.c_str());
            }
            return;
          }

          if (esphome::api::global_api_server == nullptr) return;

          id(weather_sub_gen) += 1;
          int gen = id(weather_sub_gen);
          int *gen_ptr = &id(weather_sub_gen);

          auto *api = esphome::api::global_api_server;
          using str_cb = std::function<void(const std::string &)>;

          // State = condition string (e.g. "partlycloudy")
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>(""),
              str_cb([gen, gen_ptr](const std::string &state) {
                if (gen != *gen_ptr) return;
                id(idle_weather_condition_sensor).publish_state(state);
              }));

          // temperature attribute
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("temperature"),
              str_cb([gen, gen_ptr](const std::string &state) {
                if (gen != *gen_ptr) return;
                id(idle_weather_temp_sensor).publish_state(state);
              }));

          ESP_LOGI("weather", "Subscribed to '%s'", entity.c_str());

  # ---------------------------------------------------------------------------
  # subscribe_local_temp: subscribes to an optional HA sensor entity whose
  # state (numeric) overrides the weather entity's temperature on the idle page.
  # When the entity is cleared, use_local_temp is reset to false.
  # ---------------------------------------------------------------------------
  - id: subscribe_local_temp
    mode: restart
    then:
      - lambda: |-
          std::string entity = id(local_temp_entity_select).state;

          if (entity.empty()) {
            id(use_local_temp) = false;
            // Re-publish last weather temp (triggers on_value → label update)
            if (id(idle_weather_temp_sensor).has_state()) {
              id(idle_weather_temp_sensor).publish_state(id(idle_weather_temp_sensor).state);
            }
            return;
          }

          if (esphome::api::global_api_server == nullptr) return;

          id(local_temp_sub_gen) += 1;
          int gen = id(local_temp_sub_gen);
          int *gen_ptr = &id(local_temp_sub_gen);

          auto *api = esphome::api::global_api_server;
          using str_cb = std::function<void(const std::string &)>;

          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>(""),
              str_cb([gen, gen_ptr](const std::string &state) {
                if (gen != *gen_ptr) return;
                auto v = esphome::parse_number<float>(state);
                if (!v.has_value()) return;
                id(use_local_temp) = true;
                char buf[16];
                snprintf(buf, sizeof(buf), "%d\xc2\xb0", (int)(v.value() + 0.5f));
                lv_label_set_text(id(idle_weather_temp_label), buf);
              }));

          ESP_LOGI("weather", "Local temp sensor: subscribed to '%s'", entity.c_str());

  # ---------------------------------------------------------------------------
  # subscribe_idle_sensor_N: subscribes to state + friendly_name of sensor N.
  # Shows the tile container when an entity is configured; hides it when empty.
  # ---------------------------------------------------------------------------
  - id: subscribe_idle_sensor_0
    mode: restart
    then:
      - lambda: |-
          std::string entity = id(idle_sensor_entity_0).state;

          if (entity.empty()) {
            lv_obj_add_flag(id(idle_sensor_tile_0), LV_OBJ_FLAG_HIDDEN);
            lv_label_set_text(id(idle_sensor_name_0), "");
            lv_label_set_text(id(idle_sensor_value_0), "\xe2\x80\x94");
            lv_label_set_text(id(idle_sensor_icon_0), "");
            lv_label_set_text(id(idle_sensor_unit_0), "");
            id(idle_sensor_precision_0) = -1;
            id(idle_sensor_raw_0) = "";
            return;
          }

          // Derive display name from entity_id until friendly_name arrives
          std::string name = entity;
          size_t dot = name.rfind('.');
          if (dot != std::string::npos) name = name.substr(dot + 1);
          bool cap = true;
          for (char &c : name) {
            if (c == '_') { c = ' '; cap = true; }
            else if (cap && isalpha((unsigned char)c)) { c = toupper(c); cap = false; }
            else { cap = false; }
          }
          lv_label_set_text(id(idle_sensor_name_0), name.c_str());
          lv_label_set_text(id(idle_sensor_icon_0), "\U000F0208");  // eye fallback
          lv_label_set_text(id(idle_sensor_unit_0), "");
          lv_obj_clear_flag(id(idle_sensor_tile_0), LV_OBJ_FLAG_HIDDEN);

          if (esphome::api::global_api_server == nullptr) return;

          id(idle_sensor_gen_0) += 1;
          int gen = id(idle_sensor_gen_0);
          int *gen_ptr = &id(idle_sensor_gen_0);

          auto *api = esphome::api::global_api_server;
          using str_cb = std::function<void(const std::string &)>;

          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>(""),
              str_cb([gen, gen_ptr](const std::string &state) {
                if (gen != *gen_ptr) return;
                id(idle_sensor_raw_0) = state;
                std::string out = state;
                int prec = id(idle_sensor_precision_0);
                if (prec >= 0 && !state.empty()) {
                  char *end; float val = strtof(state.c_str(), &end);
                  if (end != state.c_str()) {
                    char buf[32]; snprintf(buf, sizeof(buf), "%.*f", prec, val);
                    out = buf;
                  }
                }
                id(idle_sensor_state_0).publish_state(out);
              }));

          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("friendly_name"),
              str_cb([gen, gen_ptr](const std::string &state) {
                if (gen != *gen_ptr) return;
                if (!state.empty()) lv_label_set_text(id(idle_sensor_name_0), state.c_str());
              }));

          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("unit_of_measurement"),
              str_cb([gen, gen_ptr](const std::string &unit) {
                if (gen != *gen_ptr) return;
                lv_label_set_text(id(idle_sensor_unit_0), unit.c_str());
                lv_point_t _sz;
                lv_txt_get_size(&_sz, lv_label_get_text(id(idle_sensor_value_0)),
                  lv_obj_get_style_text_font(id(idle_sensor_value_0), LV_PART_MAIN),
                  lv_obj_get_style_text_letter_space(id(idle_sensor_value_0), LV_PART_MAIN),
                  0, LV_COORD_MAX, 0);
                lv_obj_set_x(id(idle_sensor_unit_0), 70 + _sz.x + 6);
              }));

          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("icon"),
              str_cb([gen, gen_ptr](const std::string &icon_attr) {
                if (gen != *gen_ptr) return;
                const char *ic;
                if (icon_attr == "mdi:thermometer" ||
                    icon_attr == "mdi:thermometer-low" ||
                    icon_attr == "mdi:thermometer-high") {
                  ic = "\U000F050F";
                } else if (icon_attr == "mdi:water-percent") {
                  ic = "\U000F07E4";
                } else if (icon_attr == "mdi:gauge") {
                  ic = "\U000F028A";
                } else if (icon_attr == "mdi:water") {
                  ic = "\U000F04E3";
                } else if (icon_attr == "mdi:weather-windy") {
                  ic = "\U000F059E";
                } else if (icon_attr == "mdi:lightning-bolt") {
                  ic = "\U000F140B";
                } else {
                  ic = "\U000F0208";  // mdi:eye fallback
                }
                lv_label_set_text(id(idle_sensor_icon_0), ic);
              }));

          ESP_LOGI("idle_sensors", "Tile 0: subscribed to '%s'", entity.c_str());

  - id: subscribe_idle_sensor_1
    mode: restart
    then:
      - lambda: |-
          std::string entity = id(idle_sensor_entity_1).state;

          if (entity.empty()) {
            lv_obj_add_flag(id(idle_sensor_tile_1), LV_OBJ_FLAG_HIDDEN);
            lv_label_set_text(id(idle_sensor_name_1), "");
            lv_label_set_text(id(idle_sensor_value_1), "\xe2\x80\x94");
            lv_label_set_text(id(idle_sensor_icon_1), "");
            lv_label_set_text(id(idle_sensor_unit_1), "");
            id(idle_sensor_precision_1) = -1;
            id(idle_sensor_raw_1) = "";
            return;
          }

          std::string name = entity;
          size_t dot = name.rfind('.');
          if (dot != std::string::npos) name = name.substr(dot + 1);
          bool cap = true;
          for (char &c : name) {
            if (c == '_') { c = ' '; cap = true; }
            else if (cap && isalpha((unsigned char)c)) { c = toupper(c); cap = false; }
            else { cap = false; }
          }
          lv_label_set_text(id(idle_sensor_name_1), name.c_str());
          lv_label_set_text(id(idle_sensor_icon_1), "\U000F0208");  // eye fallback
          lv_label_set_text(id(idle_sensor_unit_1), "");
          lv_obj_clear_flag(id(idle_sensor_tile_1), LV_OBJ_FLAG_HIDDEN);

          if (esphome::api::global_api_server == nullptr) return;

          id(idle_sensor_gen_1) += 1;
          int gen = id(idle_sensor_gen_1);
          int *gen_ptr = &id(idle_sensor_gen_1);

          auto *api = esphome::api::global_api_server;
          using str_cb = std::function<void(const std::string &)>;

          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>(""),
              str_cb([gen, gen_ptr](const std::string &state) {
                if (gen != *gen_ptr) return;
                id(idle_sensor_raw_1) = state;
                std::string out = state;
                int prec = id(idle_sensor_precision_1);
                if (prec >= 0 && !state.empty()) {
                  char *end; float val = strtof(state.c_str(), &end);
                  if (end != state.c_str()) {
                    char buf[32]; snprintf(buf, sizeof(buf), "%.*f", prec, val);
                    out = buf;
                  }
                }
                id(idle_sensor_state_1).publish_state(out);
              }));

          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("friendly_name"),
              str_cb([gen, gen_ptr](const std::string &state) {
                if (gen != *gen_ptr) return;
                if (!state.empty()) lv_label_set_text(id(idle_sensor_name_1), state.c_str());
              }));

          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("unit_of_measurement"),
              str_cb([gen, gen_ptr](const std::string &unit) {
                if (gen != *gen_ptr) return;
                lv_label_set_text(id(idle_sensor_unit_1), unit.c_str());
                lv_point_t _sz;
                lv_txt_get_size(&_sz, lv_label_get_text(id(idle_sensor_value_1)),
                  lv_obj_get_style_text_font(id(idle_sensor_value_1), LV_PART_MAIN),
                  lv_obj_get_style_text_letter_space(id(idle_sensor_value_1), LV_PART_MAIN),
                  0, LV_COORD_MAX, 0);
                lv_obj_set_x(id(idle_sensor_unit_1), 70 + _sz.x + 6);
              }));

          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>("icon"),
              str_cb([gen, gen_ptr](const std::string &icon_attr) {
                if (gen != *gen_ptr) return;
                const char *ic;
                if (icon_attr == "mdi:thermometer" ||
                    icon_attr == "mdi:thermometer-low" ||
                    icon_attr == "mdi:thermometer-high") {
                  ic = "\U000F050F";
                } else if (icon_attr == "mdi:water-percent") {
                  ic = "\U000F07E4";
                } else if (icon_attr == "mdi:gauge") {
                  ic = "\U000F028A";
                } else if (icon_attr == "mdi:water") {
                  ic = "\U000F04E3";
                } else if (icon_attr == "mdi:weather-windy") {
                  ic = "\U000F059E";
                } else if (icon_attr == "mdi:lightning-bolt") {
                  ic = "\U000F140B";
                } else {
                  ic = "\U000F0208";  // mdi:eye fallback
                }
                lv_label_set_text(id(idle_sensor_icon_1), ic);
              }));

