  # ---------------------------------------------------------------------------
  # fetch_sensor_precision_N: GETs /api/states/<entity_id> and parses
  # suggested_display_precision from the attributes object in the response.
  # (integration hint). Re-formats the last raw state value if precision changes.
  # Only runs when ha_token is configured.
  # ---------------------------------------------------------------------------
  - id: fetch_sensor_precision_0
    mode: single
    then:
      - lambda: |-
          std::string entity = id(idle_sensor_entity_0).state;
          if (entity.empty()) return;
          std::string url = std::string("${ha_protocol}://${ha_host}:${ha_port}"
                                        "/api/config/entity_registry");
          std::list<esphome::http_request::Header> hdrs;
          std::string auth = "Bearer ${ha_token}";
          hdrs.push_back({"Authorization", auth.c_str()});
          auto container = id(http_req)->get(url, hdrs);
          if (!container || container->status_code != 200) {
            ESP_LOGW("idle_sensors", "Tile 0 registry HTTP %d",
                     container ? container->status_code : -1);
            if (container) container->end();
            return;
          }
          std::string needle = "\"entity_id\":\"" + entity + "\"";
          std::string buf;
          buf.reserve(1024);
          bool found = false;
          int extra_after = 0;
          uint8_t chunk[256]; int n;
          while ((n = container->read(chunk, sizeof(chunk))) > 0) {
            buf.append(reinterpret_cast<char*>(chunk), n);
            if (!found) {
              if (strstr(buf.c_str(), needle.c_str())) {
                found = true;
              } else {
                if (buf.size() > needle.size() + 256)
                  buf.erase(0, buf.size() - needle.size());
              }
            } else {
              extra_after += n;
              if (extra_after >= 500) break;
            }
          }
          container->end();
          if (!found) { ESP_LOGW("idle_sensors", "Tile 0: entity not in registry"); return; }
          const char *entity_hit = strstr(buf.c_str(), needle.c_str());
          const char *search_start = entity_hit ? entity_hit : buf.c_str();
          int prec = -1;
          const char *key = strstr(search_start, "\"display_precision\":");
          if (key) {
            const char *v = key + 20;
            while (*v == ' ') v++;
            if (isdigit((unsigned char)*v)) prec = atoi(v);
          }
          if (prec < 0) {
            key = strstr(search_start, "\"suggested_display_precision\":");
            if (key) {
              const char *v = key + 30;
              while (*v == ' ') v++;
              if (isdigit((unsigned char)*v)) prec = atoi(v);
            }
          }
          if (prec < 0) { ESP_LOGI("idle_sensors", "Tile 0: no precision in registry"); return; }
          id(idle_sensor_precision_0) = prec;
          const std::string &raw = id(idle_sensor_raw_0);
          if (raw.empty()) return;
          std::string out = raw;
          char *end_ptr; float val = strtof(raw.c_str(), &end_ptr);
          if (end_ptr != raw.c_str()) {
            char fbuf[32]; snprintf(fbuf, sizeof(fbuf), "%.*f", prec, val);
            out = fbuf;
          }
          ESP_LOGI("idle_sensors", "Tile 0 precision=%d raw=%s fmt=%s", prec, raw.c_str(), out.c_str());
          id(idle_sensor_state_0).publish_state(out);

