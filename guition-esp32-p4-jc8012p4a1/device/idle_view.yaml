            x: 26
            y: 176
            width: 220
            text_font: roboto_light30_font
            text_color: 0xBBBBBB
            text_align: left
            text: ""

        # ---- Weather: top-right of left pane ----

        # Condition  e.g. "Partly Cloudy"
