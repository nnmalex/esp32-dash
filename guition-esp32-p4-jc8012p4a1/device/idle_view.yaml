# =============================================================================
# IDLE VIEW — Two-pane home screen: weather panel (left) + agenda (right)
# =============================================================================
# Layout (1280×800, navbar at y=740 — usable height 740px):
#
#   Left pane  (x=0..799,   w=800): weather background image + dark overlay
#              Top-left:  clock (large) + day + date
#              Top-right: weather condition + temperature
#              Middle:    up to 4 sensor tiles (hidden when no entity set)
#   Separator  (x=799, w=1)
#   Right pane (x=800..1279, w=480): "UPCOMING" header + 5 agenda event slots
#              Agenda shows today + tomorrow events from all calendar entities,
#              sorted by start time; past events are greyed out.
#
# Scripts called from outside:
#   update_idle_clock — called by show_idle_view (navbar.yaml) and 60 s interval
#   render_idle_agenda — defined in calendar_sensors.yaml; called here too
#
# Weather background image (idle_weather_bg_image) is defined in
# weather_sensors.yaml as an online_image. The image widget here references it.
# =============================================================================

script:
  - id: update_idle_clock
    mode: single
    then:
      - lvgl.label.update:
          id: idle_clock_label
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string(" ");
            char buf[8];
            snprintf(buf, sizeof(buf), "%d:%02d", t.hour, t.minute);
            return std::string(buf);
      - lvgl.label.update:
          id: idle_day_label
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("");
            const char *days[] = {
              "Sunday","Monday","Tuesday","Wednesday",
              "Thursday","Friday","Saturday"
            };
            return std::string(days[t.day_of_week]);
      - lvgl.label.update:
          id: idle_date_label
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("");
            const char *months[] = {
              "January","February","March","April","May","June",
              "July","August","September","October","November","December"
            };
            char buf[32];
            snprintf(buf, sizeof(buf), "%s %d", months[t.month - 1], t.day_of_month);
            return std::string(buf);
      - script.execute: render_idle_agenda


interval:
  - interval: 60s
    then:
      - if:
          condition:
            lambda: 'return id(current_view) == 0;'
          then:
            - script.execute: update_idle_clock


lvgl:
  pages:
    - id: idle_page
      scrollable: false
      scrollbar_mode: "off"
      width: 100%
      height: 100%
      bg_color: 0x111111
      pad_all: 0
      widgets:

        # ================================================================
        # LEFT PANE (x: 0..799, w=800, h=740)
        # ================================================================

        # Layer 1: weather background image (drawn first — lowest z-order)
        - image:
            id: idle_weather_bg_widget
            x: 0
            y: 0
            width: 800
            height: 740
            src: idle_weather_bg_image
            opa: 100%

        # Layer 2: dark overlay for text readability (drawn over image)
        - obj:
            x: 0
            y: 0
            width: 800
            height: 740
            bg_color: 0x000000
            bg_opa: 62%
            border_width: 0
            radius: 0
            pad_all: 0
            scrollable: false
            clickable: false

        # ---- Clock: top-left of left pane ----
        - label:
            id: idle_clock_label
            x: 24
            y: 20
            width: 360
            text_font: roboto_thin100_font
            text_color: 0xFFFFFF
            text_align: left
            text: " "

        # Day name  e.g. "Monday"
        - label:
            id: idle_day_label
            x: 26
            y: 138
            width: 220
            text_font: roboto_light30_font
            text_color: 0xBBBBBB
            text_align: left
            text: ""

        # Date  e.g. "March 27"
        - label:
