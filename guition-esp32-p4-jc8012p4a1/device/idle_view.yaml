# =============================================================================
# IDLE VIEW - Home page with clock, weather, calendar preview, and sensor row
# =============================================================================
# Replaces the placeholder idle_page from navbar.yaml.
#
# Layout (1280×800, navbar at y=740):
#   Left column  (x=0..623, w=624):  clock + date + calendar preview
#   Divider      (x=626, w=2)
#   Right column (x=641..1279, w=639): weather card
#   Sensor row   (y=640..740, h=100):  four configurable HA sensor tiles
#
# update_idle_clock is called from show_idle_view (navbar.yaml) and by a
# 60 s interval while the idle page is active. Weather and sensor data come
# from weather_sensors.yaml.
# =============================================================================

script:
  - id: update_idle_clock
    mode: single
    then:
      - lvgl.label.update:
          id: idle_clock_label
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            char buf[8];
            snprintf(buf, sizeof(buf), "%d:%02d", t.hour, t.minute);
            return std::string(buf);
      - lvgl.label.update:
          id: idle_day_label
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("");
            const char *days[] = {
              "Sunday","Monday","Tuesday","Wednesday",
              "Thursday","Friday","Saturday"
            };
            return std::string(days[t.day_of_week]);
      - lvgl.label.update:
          id: idle_date_label
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("");
            const char *months[] = {
              "January","February","March","April","May","June",
              "July","August","September","October","November","December"
            };
            char buf[32];
            snprintf(buf, sizeof(buf), "%s %d", months[t.month - 1], t.day_of_month);
            return std::string(buf);


interval:
  - interval: 60s
    then:
      - if:
          condition:
            lambda: 'return id(current_view) == 0;'
          then:
            - script.execute: update_idle_clock


lvgl:
  pages:
    - id: idle_page
      scrollable: false
      scrollbar_mode: "off"
      width: 100%
      height: 100%
      bg_color: 0x111111
      pad_all: 0
      widgets:

        # ----------------------------------------------------------------
        # LEFT COLUMN: clock + date + calendar preview (x: 0..623)
        # ----------------------------------------------------------------

        # Clock: HH:MM
        - label:
            id: idle_clock_label
            x: 0
            y: 40
            width: 624
            text_font: roboto_thin300_font
            text_color: 0xFFFFFF
            text_align: center
            text: "--:--"

        # Day name (e.g. "Monday")
        - label:
            id: idle_day_label
            x: 0
            y: 360
            width: 624
            text_font: roboto_light40_font
            text_color: 0xAAAAAA
            text_align: center
            text: ""

        # Date: "March 27"
        - label:
            id: idle_date_label
            x: 0
            y: 410
            width: 624
            text_font: roboto_light40_font
            text_color: 0xAAAAAA
            text_align: center
            text: ""

        # Calendar preview header
        - label:
            x: 48
            y: 496
            width: 584
            text_font: roboto_light26_font
            text_color: 0x555555
            text_align: left
            text: "UPCOMING"

        # Calendar event lines — Phase 4 populates these via calendar_sensors.yaml
        - label:
            id: idle_cal_event_0
            x: 48
            y: 530
            width: 584
            text_font: roboto_light26_font
            text_color: 0x888888
            text_align: left
            text: "—"

        - label:
            id: idle_cal_event_1
            x: 48
            y: 566
            width: 584
            text_font: roboto_light26_font
            text_color: 0x888888
            text_align: left
            text: "—"

        - label:
            id: idle_cal_event_2
            x: 48
            y: 602
            width: 584
            text_font: roboto_light26_font
            text_color: 0x888888
            text_align: left
            text: "—"

        # ----------------------------------------------------------------
        # Vertical divider
        # ----------------------------------------------------------------
        - obj:
            x: 626
            y: 20
            width: 2
            height: 700
            bg_color: 0x2A2A2A
            bg_opa: 100%
            border_width: 0
            radius: 0
            pad_all: 0
            scrollable: false

        # ----------------------------------------------------------------
        # RIGHT COLUMN: weather (x: 641..1279)
        # ----------------------------------------------------------------

        # Temperature  e.g. "22°"
        - label:
            id: idle_weather_temp_label
            x: 641
            y: 80
            width: 639
            text_font: roboto_light88_font
            text_color: 0xFFFFFF
            text_align: center
            text: "—"

        # Condition  e.g. "Partly Cloudy"
        - label:
            id: idle_weather_condition_label
            x: 641
            y: 186
            width: 639
            text_font: roboto_light40_font
            text_color: 0xCCCCCC
            text_align: center
            text: "—"

        # Humidity  e.g. "Humidity: 65%"
        - label:
            id: idle_weather_humidity_label
            x: 641
            y: 248
            width: 639
            text_font: roboto_light30_font
            text_color: 0x888888
            text_align: center
            text: "Humidity: —"

        # Wind speed  e.g. "Wind: 14"
        - label:
            id: idle_weather_wind_label
            x: 641
            y: 293
            width: 639
            text_font: roboto_light30_font
            text_color: 0x888888
            text_align: center
            text: "Wind: —"

        # Weather placeholder — covers right column when no entity is configured.
        # Starts hidden; subscribe_weather shows it when entity is empty/invalid.
        - obj:
            id: idle_weather_placeholder
            x: 641
            y: 0
            width: 639
            height: 640
            bg_color: 0x111111
            bg_opa: 100%
            border_width: 0
            radius: 0
            pad_all: 0
            hidden: true
            widgets:
              - label:
                  text: "Set weather entity\nin device settings"
                  text_font: roboto_light30_font
                  text_color: 0x444444
                  align: CENTER

        # ----------------------------------------------------------------
        # SENSOR ROW (y: 640..740) — four configurable HA sensor tiles
        # ----------------------------------------------------------------
        - obj:
            x: 0
            y: 640
            width: 1280
            height: 100
            bg_color: 0x1A1A1A
            bg_opa: 100%
            border_width: 0
            radius: 0
            pad_all: 0
            scrollable: false
