                  y: 0
                  width: 244
                  height: 60
                  text: "Tue 2"
                  text_font: roboto_light26_font
                  text_color: 0xCCCCCC
                  text_align: center
                  align: LEFT_MID
              - label:
                  id: cal_col_hdr_2
                  x: 548
                  y: 0
                  width: 244
                  height: 60
                  text: "Wed 3"
                  text_font: roboto_light26_font
                  text_color: 0xCCCCCC
                  text_align: center
                  align: LEFT_MID
              - label:
                  id: cal_col_hdr_3
                  x: 792
                  y: 0
                  width: 244
                  height: 60
                  text: "Thu 4"
                  text_font: roboto_light26_font
