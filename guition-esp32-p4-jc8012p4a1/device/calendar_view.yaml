      scrollbar_mode: "off"
      width: 100%
      height: 100%
      bg_color: 0x111111
      pad_all: 0
      widgets:

        # ---------------------------------------------------------------
        # HEADER  y=0..60
        # ---------------------------------------------------------------
        - obj:
            x: 0
            y: 0
            width: 1280
            height: 60
            bg_color: 0x1A1A1A
            bg_opa: 100%
            border_width: 0
            radius: 0
            pad_all: 0
            scrollable: false
            widgets:

              # -- Column header backgrounds (for today highlight) --
              - obj:
                  id: cal_col_hdr_bg_0
                  x: 60
                  y: 0
                  width: 244
                  height: 60
                  bg_color: 0x1A1A1A
                  bg_opa: 100%
                  border_width: 0
                  radius: 0
                  pad_all: 0
              - obj:
                  id: cal_col_hdr_bg_1
                  x: 304
                  y: 0
                  width: 244
                  height: 60
                  bg_color: 0x1A1A1A
                  bg_opa: 100%
                  border_width: 0
                  radius: 0
                  pad_all: 0
              - obj:
                  id: cal_col_hdr_bg_2
                  x: 548
                  y: 0
                  width: 244
                  height: 60
                  bg_color: 0x1A1A1A
                  bg_opa: 100%
                  border_width: 0
                  radius: 0
                  pad_all: 0
              - obj:
                  id: cal_col_hdr_bg_3
                  x: 792
                  y: 0
                  width: 244
                  height: 60
                  bg_color: 0x1A1A1A
                  bg_opa: 100%
                  border_width: 0
                  radius: 0
                  pad_all: 0
              - obj:
                  id: cal_col_hdr_bg_4
                  x: 1036
                  y: 0
                  width: 244
                  height: 60
                  bg_color: 0x1A1A1A
                  bg_opa: 100%
                  border_width: 0
                  radius: 0
                  pad_all: 0

              # -- Day header labels --
              - label:
                  id: cal_col_hdr_0
                  x: 60
                  y: 0
                  width: 244
                  height: 60
                  text: "Mon 1"
                  text_font: roboto_light26_font
                  text_color: 0xCCCCCC
