# =============================================================================
# CALENDAR VIEW — 5-day week grid
# =============================================================================
# Layout (1280×800, navbar at y=740):
#   Header     y=0..60   (60px): prev/next nav + 5 day column labels
#   All-day    y=60..84  (24px): one all-day chip per column
#   Time grid  y=84..740 (656px, scrollable): 24h × 44px = 1056px content
#     - Time gutter: x=0..60 (60px)
#     - 5 day columns: x=60..1280, each 244px
#     - Default scroll offset: 6 × 44 = 264px  →  6 AM at top, 9 PM at bottom
#
# Data is fetched via HA REST API by fetch_calendar_week (calendar_sensors.yaml)
# and stored in cal_events_buf as pipe-delimited lines:
#   CAL_IDX|TITLE|START_ISO|END_ISO|ALLDAY\n
#
# Legacy labels cal_time_label_0..2 etc. are kept hidden so the unchanged
# subscription scripts in calendar_sensors.yaml don't crash on lv_label_set_text.
# =============================================================================

globals:
  - id: cal_view_offset   # day offset: -1=yesterday first, 0=today first, +1/+2
    type: int
    initial_value: '0'


# -----------------------------------------------------------------------------
# Scripts
# -----------------------------------------------------------------------------
script:

  # ---------------------------------------------------------------------------
  # update_calendar_date
  # Updates the 5 day column header labels and resets scroll to 6 AM.
  # Called by show_calendar_view (navbar.yaml) and nav prev/next.
  # ---------------------------------------------------------------------------
  - id: update_calendar_date
    mode: single
    then:
      - lambda: |-
          auto t = id(ha_time).now();
          if (!t.is_valid()) return;

          const char *days[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
          int offset = id(cal_view_offset);

          lv_obj_t *hdrs[] = {
            id(cal_col_hdr_0), id(cal_col_hdr_1), id(cal_col_hdr_2),
            id(cal_col_hdr_3), id(cal_col_hdr_4)
          };
          lv_obj_t *hdr_bgs[] = {
            id(cal_col_hdr_bg_0), id(cal_col_hdr_bg_1), id(cal_col_hdr_bg_2),
            id(cal_col_hdr_bg_3), id(cal_col_hdr_bg_4)
          };

          for (int col = 0; col < 5; col++) {
            time_t ts = t.timestamp + (long)(offset + col) * 86400L;
            struct tm tb;
            localtime_r(&ts, &tb);
            bool is_today = (offset + col == 0);

            char buf[12];
            snprintf(buf, sizeof(buf), "%s %d", days[tb.tm_wday], tb.tm_mday);
            lv_label_set_text(hdrs[col], buf);

            // Highlight today
            lv_obj_set_style_text_color(hdrs[col],
                lv_color_hex(is_today ? 0x5B9FEEU : 0xCCCCCCU), 0);
            lv_obj_set_style_bg_color(hdr_bgs[col],
                lv_color_hex(is_today ? 0x1E2A3AUL : 0x1A1A1AUL), 0);
          }

          // Dim nav arrows at limits
          lv_obj_set_style_opa(id(cal_prev_label),
              (offset <= -1) ? 80 : 255, 0);
          lv_obj_set_style_opa(id(cal_next_label),
              (offset >= 2)  ? 80 : 255, 0);

          // Reset scroll to 6 AM
          lv_obj_scroll_to_y(id(cal_grid_scroll), 6 * 44, LV_ANIM_OFF);

  # ---------------------------------------------------------------------------
  # render_calendar_grid
  # Parses cal_events_buf and positions the 30 pre-allocated event blocks.
  # Called by fetch_calendar_week (calendar_sensors.yaml) after all fetches.
  # ---------------------------------------------------------------------------
  - id: render_calendar_grid
    mode: single
    then:
      - lambda: |-
          auto t = id(ha_time).now();
          int offset = id(cal_view_offset);

          // Build "YYYY-MM-DD" strings for the 5 visible columns
          char day_dates[5][11];
          for (int d = 0; d < 5; d++) {
            time_t ts = t.is_valid()
                ? t.timestamp + (long)(offset + d) * 86400L
                : 0;
            struct tm tb;
            localtime_r(&ts, &tb);
            snprintf(day_dates[d], sizeof(day_dates[d]), "%04d-%02d-%02d",
                     tb.tm_year + 1900, tb.tm_mon + 1, tb.tm_mday);
          }

          // Event block arrays (col*6 + slot)
          lv_obj_t *ev[30] = {
            id(cal_ev_00),id(cal_ev_01),id(cal_ev_02),id(cal_ev_03),id(cal_ev_04),id(cal_ev_05),
            id(cal_ev_06),id(cal_ev_07),id(cal_ev_08),id(cal_ev_09),id(cal_ev_10),id(cal_ev_11),
            id(cal_ev_12),id(cal_ev_13),id(cal_ev_14),id(cal_ev_15),id(cal_ev_16),id(cal_ev_17),
            id(cal_ev_18),id(cal_ev_19),id(cal_ev_20),id(cal_ev_21),id(cal_ev_22),id(cal_ev_23),
            id(cal_ev_24),id(cal_ev_25),id(cal_ev_26),id(cal_ev_27),id(cal_ev_28),id(cal_ev_29)
          };
          lv_obj_t *ev_ttl[30] = {
            id(cal_ev_ttl_00),id(cal_ev_ttl_01),id(cal_ev_ttl_02),id(cal_ev_ttl_03),id(cal_ev_ttl_04),id(cal_ev_ttl_05),
            id(cal_ev_ttl_06),id(cal_ev_ttl_07),id(cal_ev_ttl_08),id(cal_ev_ttl_09),id(cal_ev_ttl_10),id(cal_ev_ttl_11),
            id(cal_ev_ttl_12),id(cal_ev_ttl_13),id(cal_ev_ttl_14),id(cal_ev_ttl_15),id(cal_ev_ttl_16),id(cal_ev_ttl_17),
            id(cal_ev_ttl_18),id(cal_ev_ttl_19),id(cal_ev_ttl_20),id(cal_ev_ttl_21),id(cal_ev_ttl_22),id(cal_ev_ttl_23),
            id(cal_ev_ttl_24),id(cal_ev_ttl_25),id(cal_ev_ttl_26),id(cal_ev_ttl_27),id(cal_ev_ttl_28),id(cal_ev_ttl_29)
          };

          // All-day label arrays
          lv_obj_t *ad[5] = {
            id(cal_ad_0), id(cal_ad_1), id(cal_ad_2), id(cal_ad_3), id(cal_ad_4)
          };

          // Hide everything
          for (int i = 0; i < 30; i++) lv_obj_add_flag(ev[i], LV_OBJ_FLAG_HIDDEN);
          for (int i = 0; i < 5;  i++) lv_obj_add_flag(ad[i], LV_OBJ_FLAG_HIDDEN);

          const uint32_t CAL_COLORS[3] = {0x4A90E2U, 0x5BA55AU, 0xE2914AU};
          const int HOUR_H = 44;
          const int COL_X  = 60;
          const int COL_W  = 244;

          // --- Collect events per column (two-pass: collect then render with overlap) ---
          struct EvData {
            int  cal_idx;
            char title[64];
            int  start_min;
            int  end_min;
          };
          EvData col_events[5][6];
          int  col_ev_count[5] = {0, 0, 0, 0, 0};
          bool col_ad_used[5]  = {false, false, false, false, false};

          // Parse cal_events_buf line by line: CAL_IDX|TITLE|START_ISO|END_ISO|ALLDAY
          std::string buf = id(cal_events_buf);
          size_t pos = 0;

          while (pos < buf.length()) {
            size_t nl = buf.find('\n', pos);
            if (nl == std::string::npos) nl = buf.length();
            std::string line = buf.substr(pos, nl - pos);
            pos = nl + 1;
            if (line.empty()) continue;

            // Split on '|'
            auto fi = [&](size_t from) -> size_t { return line.find('|', from); };
            size_t p0 = fi(0);
            if (p0 == std::string::npos) continue;
            size_t p1 = fi(p0 + 1);
            if (p1 == std::string::npos) continue;
            size_t p2 = fi(p1 + 1);
            if (p2 == std::string::npos) continue;
            size_t p3 = fi(p2 + 1);
            if (p3 == std::string::npos) continue;

            int cal_idx       = atoi(line.substr(0, p0).c_str());
            std::string title     = line.substr(p0 + 1, p1 - p0 - 1);
            std::string start_iso = line.substr(p1 + 1, p2 - p1 - 1);
            std::string end_iso   = line.substr(p2 + 1, p3 - p2 - 1);
            int is_allday = atoi(line.substr(p3 + 1).c_str());

            if (start_iso.length() < 10) continue;
            std::string date_str = start_iso.substr(0, 10);

            // Find which column
            int col = -1;
            for (int d = 0; d < 5; d++) {
              if (date_str == std::string(day_dates[d])) { col = d; break; }
            }
            if (col < 0) continue;

            uint32_t color = (cal_idx >= 0 && cal_idx < 3) ? CAL_COLORS[cal_idx] : 0x888888U;

            if (is_allday) {
              if (col_ad_used[col]) continue;
              col_ad_used[col] = true;
              lv_label_set_text(ad[col], title.c_str());
              lv_obj_set_style_bg_color(ad[col], lv_color_hex(color), 0);
              lv_obj_clear_flag(ad[col], LV_OBJ_FLAG_HIDDEN);
            } else {
              int slot = col_ev_count[col];
              if (slot >= 6) continue;

              int start_min = 0, end_min = 60;
              if (start_iso.length() >= 16) {
                start_min = atoi(start_iso.substr(11, 2).c_str()) * 60
                          + atoi(start_iso.substr(14, 2).c_str());
              }
              if (end_iso.length() >= 16) {
                end_min = atoi(end_iso.substr(11, 2).c_str()) * 60
                        + atoi(end_iso.substr(14, 2).c_str());
              }
              if (end_min <= start_min) end_min = start_min + 60;
              end_min = std::min(end_min, 24 * 60);

              col_events[col][slot].cal_idx   = cal_idx;
              strncpy(col_events[col][slot].title, title.c_str(), 63);
              col_events[col][slot].title[63] = '\0';
              col_events[col][slot].start_min = start_min;
              col_events[col][slot].end_min   = end_min;
              col_ev_count[col]++;
            }
          }

          // --- Lane assignment and rendering per column ---
          for (int col = 0; col < 5; col++) {
            int n = col_ev_count[col];
            if (n == 0) continue;

            // Sort by start_min (insertion sort, n <= 6)
            for (int i = 1; i < n; i++) {
              EvData tmp = col_events[col][i];
              int j = i - 1;
              while (j >= 0 && col_events[col][j].start_min > tmp.start_min) {
                col_events[col][j + 1] = col_events[col][j];
                j--;
              }
              col_events[col][j + 1] = tmp;
            }

            // Greedy lane assignment (max 3 lanes)
            int ev_lane[6]  = {0, 0, 0, 0, 0, 0};
            int lane_end[3] = {-1, -1, -1};
            int total_lanes = 1;

            for (int i = 0; i < n; i++) {
              int assigned = 2; // fallback: last lane if all busy
              for (int l = 0; l < 3; l++) {
                if (lane_end[l] <= col_events[col][i].start_min) {
                  assigned = l; break;
                }
              }
              ev_lane[i] = assigned;
              if (col_events[col][i].end_min > lane_end[assigned])
                lane_end[assigned] = col_events[col][i].end_min;
              if (assigned + 1 > total_lanes) total_lanes = assigned + 1;
            }

            // sub_w: width per lane (2px right gap between sibling events)
            int sub_w = (COL_W - 4) / total_lanes;

            for (int i = 0; i < n; i++) {
              int idx    = col * 6 + i;
              int x_pos  = COL_X + col * COL_W + 2 + ev_lane[i] * sub_w;
              int y_pos  = col_events[col][i].start_min * HOUR_H / 60;
              int height = std::max(24, (col_events[col][i].end_min
                                       - col_events[col][i].start_min) * HOUR_H / 60);
              uint32_t color = (col_events[col][i].cal_idx >= 0 && col_events[col][i].cal_idx < 3)
                  ? CAL_COLORS[col_events[col][i].cal_idx] : 0x888888U;

              lv_obj_set_pos(ev[idx], x_pos, y_pos);
              lv_obj_set_size(ev[idx], sub_w - 2, height);
              lv_obj_set_style_bg_color(ev[idx], lv_color_hex(color), 0);
              lv_label_set_text(ev_ttl[idx], col_events[col][i].title);
              lv_label_set_long_mode(ev_ttl[idx], LV_LABEL_LONG_WRAP);
              lv_obj_set_size(ev_ttl[idx], sub_w - 8, std::max(height - 4, 14));
              lv_obj_clear_flag(ev[idx], LV_OBJ_FLAG_HIDDEN);
            }
          }

          // Current time indicator
          if (t.is_valid()) {
            int today_col = -offset;
            if (today_col >= 0 && today_col < 5) {
              int now_y = t.hour * HOUR_H + t.minute * HOUR_H / 60;
              int now_x = COL_X + today_col * COL_W;
              lv_obj_set_pos(id(cal_now_line), now_x, now_y);
              lv_obj_set_size(id(cal_now_line), COL_W, 2);
              lv_obj_clear_flag(id(cal_now_line), LV_OBJ_FLAG_HIDDEN);
            } else {
              lv_obj_add_flag(id(cal_now_line), LV_OBJ_FLAG_HIDDEN);
            }
          }


# Update the current-time line every minute when calendar is active
interval:
  - interval: 60s
    then:
      - if:
          condition:
            lambda: 'return id(current_view) == 2;'
          then:
            - lambda: |-
                auto t = id(ha_time).now();
                if (!t.is_valid()) return;
                int today_col = -id(cal_view_offset);
                if (today_col >= 0 && today_col < 5) {
                  int now_y = t.hour * 44 + t.minute * 44 / 60;
                  int now_x = 60 + today_col * 244;
                  lv_obj_set_pos(id(cal_now_line), now_x, now_y);
                  lv_obj_clear_flag(id(cal_now_line), LV_OBJ_FLAG_HIDDEN);
                }


