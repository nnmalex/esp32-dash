                  x: 1036
                  y: 0
                  width: 244
                  height: 60
                  text: "Fri 5"
                  text_font: roboto_light26_font
                  text_color: 0xCCCCCC
                  text_align: center
                  align: LEFT_MID

              # -- Prev button (left of gutter) --
              - button:
                  id: cal_prev_btn
                  x: 0
                  y: 0
                  width: 60
                  height: 60
                  bg_color: 0x1A1A1A
                  bg_opa: 0%
                  border_width: 0
                  radius: 0
                  shadow_width: 0
                  on_click:
                    - lambda: |-
                        if (id(cal_view_offset) > -1) {
                          id(cal_view_offset)--;
                          id(update_calendar_date).execute();
                          id(fetch_calendar_week).execute();
                        }
                  widgets:
                    - label:
                        id: cal_prev_label
                        text: "<"
                        text_font: roboto_light40_font
                        text_color: 0xAAAAAA
                        align: CENTER

              # -- Next button (right edge) --
              - button:
                  id: cal_next_btn
                  x: 1220
                  y: 0
                  width: 60
                  height: 60
                  bg_color: 0x1A1A1A
                  bg_opa: 0%
                  border_width: 0
                  radius: 0
                  shadow_width: 0
                  on_click:
                    - lambda: |-
                        if (id(cal_view_offset) < 2) {
                          id(cal_view_offset)++;
                          id(update_calendar_date).execute();
                          id(fetch_calendar_week).execute();
                        }
                  widgets:
                    - label:
                        id: cal_next_label
                        text: ">"
                        text_font: roboto_light40_font
                        text_color: 0xAAAAAA
                        align: CENTER

