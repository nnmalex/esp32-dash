# =============================================================================
# CALENDAR VIEW - Today's agenda from up to three HA calendar entities
# =============================================================================
# Replaces the placeholder calendar_page from navbar.yaml.
#
# Layout (1280×800, navbar at y=740):
#   Header row   (y=0..80,   h=80):   "WEDNESDAY, MARCH 27"
#   Slot 0       (y=80..300, h=220):  calendar entity 0 — coloured left accent
#   Slot 1       (y=300..520,h=220):  calendar entity 1
#   Slot 2       (y=520..740,h=220):  calendar entity 2
#
# Calendar data (HA subscription, gen-counter pattern) lives in
# calendar_sensors.yaml.  The three entity IDs are NVS-persisted text entities.
#
# update_calendar_date is called by show_calendar_view (navbar.yaml) each time
# the page becomes active so the header always shows the current date.
# =============================================================================

script:
  - id: update_calendar_date
    mode: single
    then:
      - lvgl.label.update:
          id: cal_date_header_label
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("TODAY");
            const char *days[] = {
              "Sunday","Monday","Tuesday","Wednesday",
              "Thursday","Friday","Saturday"
            };
            const char *months[] = {
              "January","February","March","April","May","June",
              "July","August","September","October","November","December"
            };
            char buf[64];
            snprintf(buf, sizeof(buf), "%s, %s %d",
                     days[t.day_of_week], months[t.month - 1], t.day_of_month);
            return std::string(buf);


lvgl:
  pages:
    - id: calendar_page
      scrollable: false
      scrollbar_mode: "off"
      width: 100%
      height: 100%
      bg_color: 0x111111
      pad_all: 0
      widgets:

        # ----------------------------------------------------------------
        # HEADER (y: 0..80)
        # ----------------------------------------------------------------
        - obj:
            x: 0
            y: 0
            width: 1280
            height: 80
            bg_color: 0x1A1A1A
            bg_opa: 100%
            border_width: 0
            radius: 0
            pad_all: 0
            scrollable: false
            widgets:
              - label:
                  id: cal_date_header_label
                  x: 0
                  y: 0
                  width: 1280
                  height: 80
                  text_font: roboto_light40_font
                  text_color: 0xCCCCCC
                  text_align: center
                  align: LEFT_MID
                  text: "TODAY"

        # ----------------------------------------------------------------
        # SLOT 0 — blue accent (y: 80..300)
        # ----------------------------------------------------------------
        - obj:
            x: 0
            y: 80
            width: 1280
            height: 220
            bg_color: 0x111111
            bg_opa: 100%
            border_width: 0
            border_side: BOTTOM
            border_color: 0x2A2A2A
            radius: 0
            pad_all: 0
            scrollable: false
            widgets:
              # Left accent bar
              - obj:
                  x: 0
                  y: 0
                  width: 6
                  height: 220
                  bg_color: 0x4A90E2
                  bg_opa: 100%
                  border_width: 0
                  radius: 0
                  pad_all: 0

              # Time  e.g. "9:00 AM"  or "All Day"
              - label:
                  id: cal_time_label_0
                  x: 30
                  y: 30
                  width: 1240
                  text_font: roboto_light40_font
                  text_color: 0x4A90E2
                  text_align: left
                  text: "—"

              # Title  e.g. "Team Meeting"
              - label:
                  id: cal_title_label_0
                  x: 30
                  y: 84
                  width: 1240
                  text_font: roboto_light40_font
                  text_color: 0xDDDDDD
                  text_align: left
                  text: "No calendar set"

              # Description / location
              - label:
                  id: cal_desc_label_0
                  x: 30
                  y: 140
                  width: 1240
                  text_font: roboto_light30_font
                  text_color: 0x777777
                  text_align: left
                  text: ""

        # ----------------------------------------------------------------
        # SLOT 1 — green accent (y: 300..520)
        # ----------------------------------------------------------------
        - obj:
            x: 0
            y: 300
            width: 1280
            height: 220
            bg_color: 0x111111
            bg_opa: 100%
            border_width: 0
            border_side: BOTTOM
            border_color: 0x2A2A2A
            radius: 0
            pad_all: 0
            scrollable: false
            widgets:
              - obj:
                  x: 0
                  y: 0
                  width: 6
                  height: 220
                  bg_color: 0x5BA55A
                  bg_opa: 100%
                  border_width: 0
                  radius: 0
                  pad_all: 0

              - label:
                  id: cal_time_label_1
                  x: 30
                  y: 30
                  width: 1240
                  text_font: roboto_light40_font
                  text_color: 0x5BA55A
                  text_align: left
                  text: "—"

              - label:
                  id: cal_title_label_1
                  x: 30
                  y: 84
                  width: 1240
                  text_font: roboto_light40_font
                  text_color: 0xDDDDDD
                  text_align: left
                  text: "No calendar set"

              - label:
                  id: cal_desc_label_1
                  x: 30
                  y: 140
                  width: 1240
                  text_font: roboto_light30_font
                  text_color: 0x777777
                  text_align: left
                  text: ""

        # ----------------------------------------------------------------
        # SLOT 2 — amber accent (y: 520..740)
        # ----------------------------------------------------------------
        - obj:
            x: 0
            y: 520
            width: 1280
            height: 220
            bg_color: 0x111111
            bg_opa: 100%
            border_width: 0
            radius: 0
            pad_all: 0
            scrollable: false
            widgets:
              - obj:
                  x: 0
                  y: 0
                  width: 6
                  height: 220
                  bg_color: 0xE2914A
                  bg_opa: 100%
                  border_width: 0
                  radius: 0
                  pad_all: 0

              - label:
                  id: cal_time_label_2
                  x: 30
                  y: 30
                  width: 1240
                  text_font: roboto_light40_font
                  text_color: 0xE2914A
                  text_align: left
                  text: "—"

              - label:
                  id: cal_title_label_2
                  x: 30
                  y: 84
                  width: 1240
                  text_font: roboto_light40_font
                  text_color: 0xDDDDDD
                  text_align: left
                  text: "No calendar set"

              - label:
                  id: cal_desc_label_2
                  x: 30
                  y: 140
                  width: 1240
                  text_font: roboto_light30_font
                  text_color: 0x777777
                  text_align: left
                  text: ""
