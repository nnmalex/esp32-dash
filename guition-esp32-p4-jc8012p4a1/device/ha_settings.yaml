# =============================================================================
# HA CONNECTION SETTINGS — compile-time substitutions
# =============================================================================
# ha_base_url is built from ha_protocol / ha_host / ha_port substitutions.
# ha_token_global holds the long-lived access token for calendar/forecast REST API.
#
# All values are set at compile time via substitutions in packages.yaml (or the
# user's esphome.yaml).  No runtime HA entity is exposed for these settings.
# =============================================================================

substitutions:
  ha_host: "homeassistant.local"
  ha_port: "8123"
  ha_protocol: "http"
  ha_token: ""


globals:
  - id: ha_token_global
    type: std::string
    restore_value: false
    initial_value: '"${ha_token}"'


esphome:
  on_boot:
    priority: -100
    then:
      - lambda: |-
          // Build ha_base_url from compile-time substitutions.
          // on_client_connected overwrites this with the live client IP for
          // http/homeassistant.local setups.
          std::string protocol = "${ha_protocol}";
          std::string host     = "${ha_host}";
          std::string port     = "${ha_port}";
          if (!host.empty() && !port.empty() && !protocol.empty()) {
            id(ha_base_url) = protocol + "://" + host + ":" + port;
            ESP_LOGI("ha_settings", "ha_base_url = %s", id(ha_base_url).c_str());
          }
