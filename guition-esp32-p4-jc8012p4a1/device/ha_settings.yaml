# =============================================================================
# HA CONNECTION SETTINGS — Runtime-configurable via HA device page
# =============================================================================
# Provides NVS-backed components for Home Assistant connection settings that
# previously required recompiling as substitutions:
#
#   ha_host_text       — HA hostname or IP  (default: homeassistant.local)
#   ha_port_text       — HA port            (default: 8123)
#   ha_protocol_select — http or https      (default: http)
#   ha_token_text      — Long-lived access token for calendar/forecast REST API
#
# All values persist across reboots. Changes to host/port/protocol take effect
# on the next HA API reconnect; token changes take effect on the next fetch.
#
# Default values fall back to substitutions from packages.yaml so existing
# installs that set those substitutions (e.g. via !secret ha_token) keep
# working on first boot.
# =============================================================================

substitutions:
  ha_host: "homeassistant.local"
  ha_port: "8123"
  ha_protocol: "http"
  ha_token: ""


text:
  - platform: template
    name: "HA Host"
    id: ha_host_text
    entity_category: config
    icon: "mdi:server-network"
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "${ha_host}"
    min_length: 0
    max_length: 100

  - platform: template
    name: "HA Port"
    id: ha_port_text
    entity_category: config
    icon: "mdi:numeric"
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "${ha_port}"
    min_length: 1
    max_length: 5

  - platform: template
    name: "HA Token"
    id: ha_token_text
    entity_category: config
    icon: "mdi:key"
    mode: password
    optimistic: true
    restore_value: true
    initial_value: "${ha_token}"
    min_length: 0
    max_length: 300


select:
  - platform: template
    name: "HA Protocol"
    id: ha_protocol_select
    entity_category: config
    icon: "mdi:lock-outline"
    optimistic: true
    restore_value: true
    initial_option: "${ha_protocol}"
    options:
      - "http"
      - "https"


esphome:
  on_boot:
    priority: -100
    then:
      - lambda: |-
          // Initialise ha_base_url from NVS-restored settings on boot,
          // before the HA API connects. on_client_connected overwrites
          // this with the live client IP for http/homeassistant.local setups.
          std::string protocol = id(ha_protocol_select).state;
          std::string host = id(ha_host_text).state;
          std::string port = id(ha_port_text).state;
          if (!host.empty() && !port.empty() && !protocol.empty()) {
            id(ha_base_url) = protocol + "://" + host + ":" + port;
            ESP_LOGI("ha_settings", "ha_base_url = %s", id(ha_base_url).c_str());
          }
