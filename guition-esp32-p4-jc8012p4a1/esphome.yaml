# Guition ESP32-P4-JC8012P4A1 Kitchen Display
substitutions:
  name: "esp32-dash"
  friendly_name: "ESP32 Dash"
  # ha_host / ha_port / ha_protocol / ha_token are set at compile time.
  # Override these substitutions to change the HA connection settings.
  # ha_host: "homeassistant.local"
  # ha_port: "8123"
  # ha_protocol: "http"
  # ha_token: !secret ha_token
  # LVGL display rotation: 90 (default landscape) or 270 (flipped landscape)
  # display_rotation: "270"
  # Touch mirroring is no longer needed for normal rotation handling.
  # touch_mirror_x: "true"
  # touch_mirror_y: "true"

# Wifi Setup
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Packages
packages:
  music_dashboard:
    url: https://github.com/nnmalex/esp32-dash
    files: [guition-esp32-p4-jc8012p4a1/packages.yaml]
    ref: main
    refresh: 1s
