# Guition ESP32-P4-JC8012P4A1 Kitchen Display
substitutions:
  name: "esp32-dash"
  friendly_name: "ESP32 Dash"
  # ha_host / ha_port / ha_protocol / ha_token are now configurable at runtime
  # via the HA device settings page — no recompile needed.
  # Set them here only if you want to override the defaults at compile time.
  # ha_host: "homeassistant.local"
  # ha_port: "8123"
  # Display rotation: 90 (default landscape) or 270 (flipped landscape)
  # display_rotation: "270"
  # Touch transform (must match display_rotation):
  #   90:  touch_mirror_x "false", touch_mirror_y "false"
  #   270: touch_mirror_x "true",  touch_mirror_y "true"
  # touch_mirror_x: "true"
  # touch_mirror_y: "true"

# Wifi Setup
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Packages
packages:
  music_dashboard:
    url: https://github.com/nnmalex/esp32-dash
    files: [guition-esp32-p4-jc8012p4a1/packages.yaml]
    ref: main
    refresh: 1s
