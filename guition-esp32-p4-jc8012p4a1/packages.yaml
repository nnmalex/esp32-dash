substitutions:
  media_player: ""
  ha_port: "8123"
  ha_host: "homeassistant.local"
  ha_protocol: "http"
  ha_verify_ssl: "true"
  ha_token: ""   # Long-lived access token for calendar/forecast REST API
  ntp_server: "time.cloudflare.com"
  # LVGL display rotation: 90 (default landscape) or 270 (flipped landscape)
  # Flip to 270 if mounting with the power cable on the opposite side
  display_rotation: "90"
  # Touch mirroring is no longer needed for normal rotation handling.
  touch_mirror_x: "false"
  touch_mirror_y: "false"

packages:
  music: !include addon/music.yaml
  accent_color: !include addon/accent_color.yaml
  backlight: !include addon/backlight.yaml
  time_sync: !include addon/time.yaml
  timezone: !include addon/timezone.yaml
  network: !include addon/network.yaml
  speaker_group: !include addon/speaker_group.yaml
  fonts: !include assets/fonts.yaml
  icons: !include assets/icons.yaml
  device: !include device/device.yaml
  ha_settings: !include device/ha_settings.yaml
  media_player_select: !include device/media_player_select.yaml
  sensors: !include device/sensors.yaml
  lvgl: !include device/lvgl.yaml
  navbar: !include device/navbar.yaml
  idle_view: !include device/idle_view.yaml
  weather_sensors: !include device/weather_sensors.yaml
  calendar_view: !include device/calendar_view.yaml
  calendar_sensors: !include device/calendar_sensors.yaml
  forecast_view: !include device/forecast_view.yaml
  forecast_sensors: !include device/forecast_sensors.yaml
  timer_overlay: !include device/timer_overlay.yaml
  button: !include theme/button.yaml
