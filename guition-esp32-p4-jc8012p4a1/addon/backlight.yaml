# =============================================================================
# BACKLIGHT - Day/night brightness
# =============================================================================
# Two brightness levels: one for daytime, one for nighttime.
# Night window is defined by start/end hour (local time, 24-hour).
# Brightness is re-evaluated on touch, media state change, and every 5 minutes.
# =============================================================================


# -----------------------------------------------------------------------------
# BACKLIGHT LIGHT OUTPUT
# -----------------------------------------------------------------------------
esphome:
  on_boot:
    priority: -10
    then:
      - light.turn_on:
          id: backlight
          brightness: 100%
          transition_length: 500ms
      - script.execute: backlight_wake_timeout


light:
  - platform: monochromatic
    name: Backlight
    id: backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 1s
    internal: true


# -----------------------------------------------------------------------------
# USER-CONFIGURABLE SETTINGS
# -----------------------------------------------------------------------------
number:
  - platform: template
    name: "Day: Brightness"
    id: backlight_day_active_brightness
    min_value: 5
    max_value: 100
    step: 5
    initial_value: 100
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    icon: "mdi:brightness-7"
    entity_category: config
    set_action:
      - script.execute: backlight_wake_timeout

  - platform: template
    name: "Night: Brightness"
    id: backlight_night_active_brightness
    min_value: 5
    max_value: 100
    step: 5
    initial_value: 80
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    icon: "mdi:brightness-4"
    entity_category: config
    set_action:
      - script.execute: backlight_wake_timeout

  - platform: template
    name: "Night: Start Hour"
    id: night_start_hour
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 22
    optimistic: true
    restore_value: true
    unit_of_measurement: "h"
    icon: "mdi:weather-night"
    entity_category: config
    set_action:
      - script.execute: backlight_wake_timeout

  - platform: template
    name: "Night: End Hour"
    id: night_end_hour
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 7
    optimistic: true
    restore_value: true
    unit_of_measurement: "h"
    icon: "mdi:weather-sunny"
    entity_category: config
    set_action:
      - script.execute: backlight_wake_timeout


# -----------------------------------------------------------------------------
# BACKLIGHT BRIGHTNESS SCRIPT
# -----------------------------------------------------------------------------
# Sets brightness based on whether the current local hour falls within the
# configured night window (night_start_hour to night_end_hour).
# Night wraps midnight when start > end (e.g. 22 to 7).
# -----------------------------------------------------------------------------
script:
  - id: backlight_wake_timeout
    mode: restart
    then:
      - lvgl.resume:
      - light.turn_on:
          id: backlight
          brightness: !lambda |-
            auto t = id(ha_time).now();
            bool is_night = false;
            if (t.is_valid()) {
              int h = t.hour;
              int ns = (int)id(night_start_hour).state;
              int ne = (int)id(night_end_hour).state;
              is_night = (ns > ne) ? (h >= ns || h < ne) : (h >= ns && h < ne);
            }
            float pct = is_night
              ? id(backlight_night_active_brightness).state
              : id(backlight_day_active_brightness).state;
            return pct / 100.0f;
          transition_length: 500ms


# -----------------------------------------------------------------------------
# PERIODIC BRIGHTNESS UPDATE (every 5 minutes)
# -----------------------------------------------------------------------------
# Re-evaluates day/night so transitions happen automatically without touch.
# -----------------------------------------------------------------------------
interval:
  - interval: 5min
    then:
      - script.execute: backlight_wake_timeout
