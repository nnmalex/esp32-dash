name: Build and publish firmware

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Cache PlatformIO toolchain
        uses: actions/cache@v4.2.3
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('builds/guition-esp32-p4-jc8012p4a1.yaml') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install ESPHome
        run: pip install esphome

      - name: Set firmware version
        id: version
        run: |
          VERSION="$(date -u +%Y.%m.%d.%H%M)-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "FIRMWARE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Fetch latest release notes
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUMMARY=$(gh api repos/${{ github.repository }}/releases/latest --jq '.body' 2>/dev/null || echo "")
          URL=$(gh api repos/${{ github.repository }}/releases/latest --jq '.html_url' 2>/dev/null || echo "https://github.com/${{ github.repository }}/releases")
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Compile firmware
        run: esphome compile builds/guition-esp32-p4-jc8012p4a1.yaml

      - name: Package firmware artifacts
        env:
          RELEASE_SUMMARY: ${{ steps.release.outputs.summary }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
        run: |
          OTA_BIN=$(find . -path '*/.esphome/build*' -name "firmware.ota.bin" | head -1)
          if [ -z "$OTA_BIN" ]; then
            echo "ERROR: firmware.ota.bin not found in build output"
            find . -path '*/.esphome/build*' -type f | sort
            exit 1
          fi
          MD5=$(md5sum "$OTA_BIN" | cut -d' ' -f1)

          mkdir -p firmware
          cp "$OTA_BIN" firmware/esp32-dash-jc8012p4a1.ota.bin

          jq -n \
            --arg name "esp32-dash" \
            --arg version "${{ steps.version.outputs.version }}" \
            --arg summary "$RELEASE_SUMMARY" \
            --arg release_url "$RELEASE_URL" \
            --arg ota_path "https://nnmalex.github.io/esp32-dash/firmware/esp32-dash-jc8012p4a1.ota.bin" \
            --arg md5 "$MD5" \
            '{
              name: $name,
              version: $version,
              summary: $summary,
              release_url: $release_url,
              builds: [{chipFamily: "ESP32-P4", ota: {path: $ota_path, md5: $md5}}]
            }' > firmware/esp32-dash-jc8012p4a1.manifest.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./firmware
          destination_dir: firmware
          keep_files: true
