name: Build firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Cache PlatformIO toolchain
        uses: actions/cache@v5.0.4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('builds/guition-esp32-p4-jc8012p4a1.yaml') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install ESPHome
        run: pip install "esphome>=2026.4.0,<2026.5"

      - name: Compile firmware
        run: esphome compile builds/guition-esp32-p4-jc8012p4a1.yaml
